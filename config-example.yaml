# =============================================================================
# opsrag - annotated configuration reference
# =============================================================================
# This file documents EVERY available configuration block and its options.
# It is a reference, not a ready-to-run config: copy the blocks you need into
# your own config.yaml (see config.yaml for the minimal shipped default).
#
# Conventions:
#   - Any key ending in `_env` names the ENV VAR that carries the secret -
#     the secret value itself is never written here or in config.yaml.
#   - Blocks with `enabled: false` are inert until you flip them on.
#   - The root model forbids unknown keys: a typo'd block name fails startup.
# =============================================================================

# --- Authentication ----------------------------------------------------------
# Authentication is ALWAYS enforced -- there is no anonymous / "open" mode.
#   mode: oidc  -> validate Bearer JWTs against an external IdP (issuer/audience).
#   mode: login -> first-party login (built-in admin + optional SSO); the
#                  default when no `auth` block is supplied.
auth:
  mode: oidc                                   # oidc | login
  issuer: https://your-idp.example.com        # OIDC discovery base URL (mode=oidc)
  audience: opsrag                             # expected token audience (mode=oidc)
  jwks_cache_seconds: 300                      # how long to cache signing keys
  # RBAC roles: map an IdP group / claim value -> opsrag roles.
  # role_mappings:
  #   sre-admins: [admin]
  #   oncall:     [member_investigate]
  # Per-connector RBAC (optional): map a role -> the MCP connectors it grants.
  # ONLY affects connectors flagged `restricted: true` under `mcp:` below --
  # non-restricted connectors are usable by everyone; the `admin` role implies
  # all; `["*"]` grants every enabled connector. Per-user allow/deny overrides
  # are set in the "Users & Roles" admin UI, not here.
  # role_connectors:
  #   sre:     [datadog, kubernetes, elasticsearch]
  #   finops:  [billing_gcp, billing_datadog, billing_kubecost, billing_mongodb_atlas]

# --- Cloud model bundle (optional shortcut) ----------------------------------
# Set ONE provider to get sane per-purpose model defaults (reason / tool_call /
# embed / rerank / summarize / extract) without spelling out every slot below.
# Any explicit slot (llm/embedding/reranker/agent.pro_model) or env var always
# wins over the bundle. Precedence: env var > this YAML > bundle default.
#   cloud_provider: aws   # -> Bedrock: Sonnet 4.6 (reason+pro), Haiku 4.5 (tools),
#                         #    Cohere Embed v4 + Rerank 3.5
#   cloud_provider: gcp   # -> Vertex: Gemini 2.5 Flash/Pro + Gemini embeddings
#
# Override any model at deploy time via env (no rebuild) -- handy for picking a
# cost/quality tier or bumping a deprecated model id:
#   OPSRAG_CLOUD_PROVIDER, OPSRAG_LLM_PROVIDER, OPSRAG_LLM_MODEL, OPSRAG_PRO_MODEL,
#   OPSRAG_EMBEDDING_PROVIDER, OPSRAG_EMBEDDING_MODEL, OPSRAG_EMBEDDING_DIMENSION,
#   OPSRAG_RERANKER_PROVIDER, OPSRAG_RERANKER_MODEL   (see .env.example)
# cloud_provider: aws

# --- LLM provider ------------------------------------------------------------
llm:
  provider: anthropic            # anthropic | openai | vertex | bedrock
  model: claude-sonnet-4-20250514
  api_key_env: ANTHROPIC_API_KEY # anthropic/openai
  max_tokens: 4096
  # Vertex AI:
  #   provider: vertex
  #   model: gemini-2.0-flash
  #   project: your-gcp-project
  #   location: us-central1
  # Bedrock:
  #   provider: bedrock
  #   model: anthropic.claude-sonnet-4-20250514-v1:0
  #   aws_region: us-east-1
  #   aws_profile: your-aws-profile

# --- Vision (image understanding) --------------------------------------------
# Attach images to a chat turn on the web UI AND every channel bot
# (Telegram/Discord/Slack/Teams). The image is sent to a vision-capable model
# alongside the question for THAT turn only -- bytes are ephemeral (never written
# to the checkpoint, session store, or any durable store; history keeps just a
# "[attached image: <name>]" marker).
#
# `model`/`provider` are an auto-route FALLBACK, used only when the active
# llm.model can't see. Left null, a provider-aware default is resolved at
# startup: Bedrock/Anthropic -> claude-sonnet-4-6 ; Vertex -> gemini-3-flash-preview.
# If no vision model is available the image is dropped and the answer says so.
# All keys are env/YAML overridable (no rebuild): OPSRAG_VISION_ENABLED,
# OPSRAG_VISION_MODEL, OPSRAG_VISION_PROVIDER (see .env.example).
vision:
  enabled: true
  model: null            # explicit override wins, e.g. "anthropic.claude-sonnet-4-6-v1:0"
  provider: null         # defaults to llm.provider above
  max_images: 4          # per turn (whole turn rejected if exceeded)
  max_bytes: 5242880     # 5 MB per image
  allowed_mime: ["image/png", "image/jpeg", "image/gif", "image/webp"]

# --- Embeddings --------------------------------------------------------------
embedding:
  provider: fastembed            # fastembed | openai | vertex | bedrock
  model: BAAI/bge-small-en-v1.5  # fastembed: local ONNX (384-dim)
  # dimension: 384               # override when the provider supports it
  # openai:   provider: openai, model: text-embedding-3-large, api_key_env: OPENAI_API_KEY
  # vertex:   provider: vertex,  model: text-embedding-005, project/location
  # bedrock:  provider: bedrock, model: amazon.titan-embed-text-v2:0, aws_region

# --- Vector store ------------------------------------------------------------
# Retrieval-quality trade-off (qdrant vs pgvector):
#   qdrant   -- full hybrid: dense ANN + a TRUE BM25 sparse lane (FastEmbed IDF
#               over identifier-subtoken-augmented text) and the optional code
#               lane below. Best lexical/symbol ranking; recommended default.
#   pgvector -- strong dense ANN, but NOT at lexical parity: the sparse lane is
#               Postgres FTS (ts_rank_cd) + a best-effort pg_trgm trigram lane
#               for exact-symbol recall -- not true BM25/IDF ranking. The code
#               lane below is Qdrant-only and does NOT apply. Pick pgvector to
#               avoid running Qdrant (e.g. reuse RDS/CloudSQL/AlloyDB); accept
#               somewhat weaker lexical-relevance ranking on symbol-heavy queries.
vector_store:
  provider: qdrant               # qdrant | pgvector
  url: http://localhost:6333
  collection: opsrag
  # api_key_env: QDRANT_API_KEY  # for Qdrant Cloud
  # pgvector:
  #   provider: pgvector
  #   dsn_env: PGVECTOR_DSN
  #   # NOTE: FTS + pg_trgm sparse lane, no true BM25, no code lane (see above).
  #   # pg_trgm must be grantable (CREATE EXTENSION pg_trgm) or exact-symbol
  #   # recall degrades to dense + FTS only.

# --- Code lane (OPTIONAL, Qdrant only) ---------------------------------------
# Retrieval is always hybrid (dense + BM25 RRF). Enabling the code lane adds a
# 4th RRF lane over a SEPARATE collection of code chunks embedded with a
# code-specialized embedder -- big win for "where is function X / which file
# defines Y" queries. Leave BOTH blocks unset (the default) to run dense+BM25
# only; you still get the BM25 lexical boost without this.
#
# To enable: set both blocks, then RE-INDEX (code chunk boundaries change, so
# the code collection must be (re)built). Prose retrieval is unaffected.
# code_embedding:                # embedder for the code collection (any EmbeddingConfig)
#   provider: bedrock
#   model: cohere.embed-english-v3   # or a code-tuned model (e.g. voyage-code, jina-code via litellm)
#   aws_region: us-west-2
# code_vector_store:             # the separate code collection (Qdrant)
#   provider: qdrant
#   url: http://localhost:6333
#   collection: opsrag_code

# --- Knowledge graph ---------------------------------------------------------
knowledge_graph:
  provider: none                 # none (FR-019 null backend) | neo4j
  # neo4j:
  #   provider: neo4j
  #   url: bolt://localhost:7687
  #   username: neo4j
  #   password_env: NEO4J_PASSWORD
  #   database: neo4j

# --- Reranker ----------------------------------------------------------------
reranker:
  provider: noop                 # noop | cohere | fastembed | vertex
  # cohere:  provider: cohere, model: rerank-v3.5, api_key_env: COHERE_API_KEY
  # vertex:  provider: vertex,  project: your-gcp-project, location: global

# --- Sessions / Memory -------------------------------------------------------
session:
  provider: postgres             # memory | postgres
  dsn_env: POSTGRES_DSN
memory:
  provider: memory               # memory | postgres
  # dsn_env: POSTGRES_DSN

# --- Chunking ----------------------------------------------------------------
chunking:
  strategy: parent_child         # parent_child | fixed_size
  child_size: 256
  child_overlap: 32
  parent_max_tokens: 1024
  # fixed_size: strategy: fixed_size, chunk_size: 512, overlap: 64

# --- Entity extraction -------------------------------------------------------
entity_extraction:
  method: rule_based             # rule_based | llm | hybrid

# --- Observability -----------------------------------------------------------
observability:
  provider: console              # console | phoenix
  project_name: opsrag
  # phoenix: provider: phoenix, endpoint: http://localhost:6006 (PHOENIX_API_KEY optional)

# --- Agent tuning ------------------------------------------------------------
agent:
  mode: full                     # full | minimal  (legacy 'hybrid' lane removed)
  top_k: 10
  rerank_top_k: 5
  max_retries: 3
  # pro_model: claude-opus-4-...   # optional escalation model

# --- SCM (source indexing) ---------------------------------------------------
scm:
  provider: gitlab               # gitlab | github
  base_url: https://gitlab.com
  token_env: GITLAB_TOKEN
  repos: []                      # list of repo paths/URLs to index
  default_branch: main
  auto_index: true
  clone_mode: true
  use_ssh: false
  # ssh_host / ssh_user when use_ssh: true

# --- HTTP API ----------------------------------------------------------------
api:
  api_keys: []                   # static API keys (alternative to OIDC, dev only)
  api_keys_env: OPSRAG_API_KEYS
  rate_limit_enabled: true
  rate_limit_rpm: 60

# --- Branding (UI white-label) -----------------------------------------------
brand:
  name: OpsRAG
  subtitle: DevOps Intelligence
  assistant_name: OpsRAG
  favicon_url: ""
  accent_color: ""

# --- Scheduler (daily background indexing) -----------------------------------
scheduler:
  enabled: false
  timezone: UTC
  cron_hour: 2
  cron_minute: 0
  jitter_seconds: 900
  parallel_limit: 3

# --- Deployment context (Principle VI: org-specific facts via config) ---------
# Feeds prompt templates and dynamic regexes so no deployment fact is hardcoded
# in code. All lists are optional and default to empty.
deployment:
  organization_label: null       # display name for your org (optional)
  services: []                   # e.g. [api, web, worker]
  environments: []               # e.g. [prod, staging, dev]
  key_repos: []                  # notable repos with one-line layout hints
  kubernetes: {}                 # clusters: [...], default_cluster: ...
  cloud: {}                      # gcp_projects: [...], etc.
  tracker: {}                    # ticket_prefix, base_url
  source_urls: {}                # confluence/slack/rootly/scm base URLs for links
  semantic_router_examples: {}   # optional classifier augmentation examples

# --- Non-git knowledge sources (opt-in ingestion) ----------------------------
confluence:
  enabled: false
  base_url: https://your-org.atlassian.net/wiki
  email_env: CONFLUENCE_EMAIL
  api_token_env: CONFLUENCE_API_TOKEN
  spaces_allowlist: []
  spaces_denylist: []
  label_denylist: []
rootly:
  enabled: false
  api_token_env: ROOTLY_API_TOKEN
  base_url: https://api.rootly.com/v1
  web_base_url: null             # for clickable incident links
  statuses: []
  post_mortem_statuses: []
  skip_private: true
slack:
  enabled: false
  bot_token_env: SLACK_BOT_TOKEN
  workspace_url: null            # for clickable message links
  channels_allowlist: []
  backfill_days: 30
  min_replies_per_thread: 1

# --- Slack bot (Socket Mode worker) -- DEPRECATED -----------------------------
# Back-compat only. New deployments should configure bots under `channels:`
# below. When `slack_bot.enabled` is true and `channels.slack` is left at its
# defaults, this block is mirrored into `channels.slack` at load (with a
# deprecation warning). Both paths boot the same Slack adapter.
slack_bot:
  enabled: false
  bot_token_env: OPSRAG_SLACK_BOT_TOKEN
  app_token_env: OPSRAG_SLACK_APP_TOKEN
  channels_allowlist: []
  streaming_enabled: true
  per_user_daily_quota: 200

# --- Multi-channel bots (Slack / Telegram / Discord / Teams) -----------------
# Each channel is its own role-gated worker EXCEPT Teams, which is a webhook
# mounted on the `api` role (Bot Framework pushes inbound activities). Enable a
# channel here AND run a worker with OPSRAG_ROLE=<name>bot (slackbot /
# telegrambot / discordbot). Secrets are referenced only by their `*_env` var
# names (Principle VI) -- never inline tokens. `allowlist` holds channel/chat
# ids (DMs bypass the allowlist but not the per-user quota).
channels:
  slack:
    enabled: false
    bot_token_env: OPSRAG_SLACK_BOT_TOKEN
    app_token_env: OPSRAG_SLACK_APP_TOKEN
    allowlist: []                # Slack channel ids (C...) the bot answers in
    dm_allowlist: []             # user ids allowed to DM (empty => no DMs; ["*"] => anyone)
    per_user_daily_quota: 200
    streaming_enabled: true
    web_ui_base_url: ""          # deep-link base for "View in OpsRAG UI"
  telegram:
    enabled: false
    bot_token_env: OPSRAG_TELEGRAM_BOT_TOKEN
    allowlist: []                # chat ids (may be negative for groups)
    dm_allowlist: []             # user ids allowed to DM (empty => no DMs; ["*"] => anyone)
    per_user_daily_quota: 200
    web_ui_base_url: ""
  discord:
    enabled: false
    bot_token_env: OPSRAG_DISCORD_BOT_TOKEN
    allowlist: []                # channel ids
    dm_allowlist: []             # user ids allowed to DM (empty => no DMs; ["*"] => anyone)
    per_user_daily_quota: 200
    web_ui_base_url: ""
  teams:
    enabled: false               # webhook on the `api` role (no worker)
    app_id_env: OPSRAG_TEAMS_APP_ID
    app_password_env: OPSRAG_TEAMS_APP_PASSWORD
    allowlist: []                # conversation ids
    dm_allowlist: []             # user ids allowed to DM (empty => no DMs; ["*"] => anyone)
    per_user_daily_quota: 200
    web_ui_base_url: ""

# --- MCP integrations --------------------------------------------------------
# All twenty, disabled. Flip `enabled: true` and provide the integration's
# required env (see .env.example). Missing env on an enabled MCP fails startup
# with MCP_MISCONFIGURED:<name>:<env> (FR-004). Per-integration knobs go under
# `extra:` and are validated by that integration's own model.
#
# Per-connector RBAC: add `restricted: true` to make a connector off-by-default
# (usable only by users granted it via auth.role_connectors or a per-user
# override in the admin UI; the `admin` role always has access). Non-restricted
# connectors stay usable by every authenticated user.
#   datadog: { enabled: true, restricted: true }
mcp:
  aws:           { enabled: false }   # AWS read-only (EC2/EKS/ECS/CloudWatch/S3/Cost + aws_read)
  azure:         { enabled: false }   # Azure read-only (Monitor/AKS/Resource Graph)
  # --- Billing category (cost/spend). Read-only. Ship `restricted: true` -----
  # (admin/finops only) -- grant via auth.role_connectors below. See env vars
  # for each under the "Billing connectors" note after this block.
  billing_gcp:           { enabled: false, restricted: true }   # GCP cost via BigQuery billing export
  billing_datadog:       { enabled: false, restricted: true }   # Datadog usage/cost (reuses DD_* keys; APP key needs usage_read+billing_read)
  billing_kubecost:      { enabled: false, restricted: true }   # Kubecost K8s cost allocation (in-cluster)
  billing_mongodb_atlas: { enabled: false, restricted: true }   # MongoDB Atlas invoices/cost
  cloudflare:    { enabled: false }   # Cloudflare zones / DNS / Zero-Trust
  code:          { enabled: false }   # code search lane
  datadog:       { enabled: false }   # Datadog metrics / monitors / APM
  elasticsearch: { enabled: false }   # Elasticsearch / OpenSearch log search
  gcp:           { enabled: false }   # Google Cloud read-only (Logging/Monitoring/GKE/Run/Asset)
  github:        { enabled: false }   # GitHub API (files, commits, PRs, issues, Actions)
  gitlab:        { enabled: false }   # GitLab API (MRs, pipelines, files)
  grafana:       { enabled: false }   # Grafana dashboards + Prometheus/Loki proxy + alerts
  knowledge:     { enabled: false }   # internal knowledge base
  kubernetes:    { enabled: false }   # K8s inspection (needs KUBECONFIG)
  loki:          { enabled: false }   # Grafana Loki log queries (LogQL)
  prometheus:    { enabled: false }   # Prometheus queries
  rootly:        { enabled: false }   # Rootly incidents
  runbooks:      { enabled: false }   # runbook lookup tool
  sentry:        { enabled: false }   # Sentry errors / issues / events
  slack:         { enabled: false }   # Slack search tool
  splunk:        { enabled: false }   # Splunk SPL search (read-only)
  tool_cache:    { enabled: false }   # cross-tool result cache

# --- Billing connectors: env vars (secrets come from env, never inline) ------
# billing_gcp     -- ADC/Workload Identity (bigquery.jobUser + dataViewer on the
#                    export dataset). OPSRAG_GCP_BILLING_TABLE=proj.dataset.gcp_billing_export_v1_*
#                    (+ OPSRAG_GCP_BILLING_PROJECT / _MAX_BYTES / _ENV_MAP). Needs the `billing` extra.
# billing_datadog -- reuses DD_API_KEY / DD_APP_KEY / DD_SITE (APP key scopes usage_read+billing_read).
# billing_kubecost-- OPSRAG_KUBECOST_URL=http://kubecost-cost-analyzer.kubecost.svc.cluster.local:9090
# billing_mongodb_atlas -- OPSRAG_ATLAS_ORG_ID + (OPSRAG_ATLAS_CLIENT_ID/_SECRET OAuth2 SA, or
#                    OPSRAG_ATLAS_PUBLIC_KEY/_PRIVATE_KEY).

# --- Multi-environment registry (kubernetes / prometheus / elasticsearch) -----
# One OpsRAG instance can target N environments; the k8s / prometheus /
# elasticsearch tools take an optional `env` arg to pick one (omitted -> default).
# `elasticsearch` per env is EITHER a single target OR a named-cluster map for
# environments with several ES clusters (e.g. separate infra-logs / integration-
# logs / product-data clusters). The ES tools then take a `cluster` arg (omitted
# -> the env's `default`), and `elasticsearch_list_clusters` reports each with
# its `usage_note`. Each cluster authenticates independently (its own key).
# environments:
#   default: prd
#   targets:
#     prd:
#       kubernetes: { mode: gke, project: my-proj, location: us-west1, name: prod }
#       # (a) single ES cluster for this env:
#       # elasticsearch: { reach: port_forward, namespace: logging, service: app-logs-es-http, api_key_env: ES_PRD_KEY }
#       # (b) multiple named ES clusters for this env:
#       elasticsearch:
#         default: app-logs
#         clusters:
#           app-logs:     { reach: port_forward, namespace: logging,     service: app-logs-es-http,     api_key_env: ES_PRD_APPLOGS_KEY,     index_pattern: "app-logs-*",         usage_note: "Container/app logs for most services." }
#           integration:  { reach: port_forward, namespace: integration, service: integration-es-http,  api_key_env: ES_PRD_INTEGRATION_KEY, index_pattern: "integration-logs-*", usage_note: "Integration pipeline logs." }
