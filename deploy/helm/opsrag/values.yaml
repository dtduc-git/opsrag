# =============================================================================
# opsrag Helm chart - default values
# =============================================================================
# Every key is documented inline. Secrets are NOT set here - reference them via
# existing Kubernetes Secrets (secretRef) or the opt-in `secret` block. All 14
# MCP integrations are present and disabled by default (FR-011); each enabled
# flag is wired to the api container as OPSRAG_MCP_<NAME>_ENABLED.
# =============================================================================

nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/dtduc-git/opsrag
  tag: "0.2.0"
  pullPolicy: IfNotPresent
imagePullSecrets: []

# --- Authentication ----------------------------------------------------------
# Authentication is ALWAYS enforced -- there is no anonymous / "open" mode.
# This chart is oidc-oriented: it verifies Bearer JWTs against an external IdP.
# Set a REAL issuer + audience (the placeholders below fail at boot). Grant admin
# by mapping an IdP group to the `admin` role via `role_mappings` (config.yaml-only
# -- see docs/auth.md). The first-party `login` mode (admin + SSO + cookie
# sessions) needs a session signing key + admin secret this chart does NOT wire;
# to run `login`, supply your own `config.yaml`.
auth:
  mode: oidc                             # oidc | login  (oidc is what the chart wires)
  issuer: https://your-idp.example.com   # OIDC discovery base URL (required for oidc)
  audience: opsrag                        # expected token audience (required for oidc)
  jwksCacheSeconds: 300
  # Per-connector RBAC (optional): map an opsrag role -> the MCP connectors it
  # grants. ONLY affects connectors flagged `restricted: true` below (others are
  # usable by everyone); the `admin` role implicitly grants all. `["*"]` = all.
  # Per-user allow/deny overrides live in the "Users & Roles" admin UI, not here.
  roleConnectors: {}
  #   sre:     [datadog, kubernetes, elasticsearch]
  #   finance: [gcp]

# --- API workload ------------------------------------------------------------
api:
  replicaCount: 2
  port: 8080
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  # Rate-limit backend (renders into config.api). OMITTED by default so the
  # app default applies (backend=memory, in-process). Set backend=redis to
  # share limiter state across replicas -- Redis then becomes REQUIRED: the
  # API PINGs it at boot and fails fast if unreachable. The URL is read from
  # the env var named by `redisUrlEnv` (default OPSRAG_REDIS_URL), supplied via
  # api.envFromSecret -- never inline. `redis` is an optional image extra.
  rateLimit: {}
    # backend: redis              # memory (default) | redis
    # redisUrlEnv: OPSRAG_REDIS_URL
    # rpm: 60                      # requests/min/identity (default 60)
  # Extra environment variables (name/value) for the api container.
  extraEnv: []
  # Name of an existing Secret whose keys are injected as env vars (LLM keys,
  # MCP credentials, POSTGRES_DSN, ...). Empty = none.
  envFromSecret: ""
  service:
    type: ClusterIP
    port: 80

# --- UI workload -------------------------------------------------------------
ui:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/dtduc-git/opsrag-ui
    tag: "0.2.0"
    pullPolicy: IfNotPresent
  port: 5173
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

# --- Phoenix (LLM observability collector + viewer) --------------------------
# Bundled Arize Phoenix. Rendered ONLY when config.observability.enabled is
# true AND config.observability.externalEndpoint is empty. Toggling
# config.observability.enabled brings this up/down with no image rebuild; the
# API's PHOENIX_COLLECTOR_ENDPOINT is wired to this Service automatically.
phoenix:
  image:
    repository: arizephoenix/phoenix
    tag: version-16.3.0
    pullPolicy: IfNotPresent
  port: 6006                 # OTLP HTTP collector + web UI
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  # Phoenix keeps traces in-memory by default (lost on restart). For durable
  # trace history, enable a PVC mounted at /data.
  persistence:
    enabled: false
    size: 2Gi
    storageClass: ""

# --- Indexing Job (ephemeral; replaces the always-on indexer) ----------------
# Indexing runs as a run-to-completion Job, not a long-running pod. The CronJob
# below is BOTH the scheduled full-reindex and the template the API clones for
# ad-hoc POST /index/repo Jobs. Backend pods stay pure-serving; progress is
# tracked in the durable Postgres job-state, so all replicas show a consistent
# /indexing/status (the old in-memory tracker diverged per pod).
indexJob:
  enabled: true
  # API trigger mode: auto | k8s | inprocess.
  #   auto      -> spawn a Job when running in-cluster, else in-process (dev)
  #   k8s       -> always spawn a Job (errors if RBAC/cronjob missing)
  #   inprocess -> never spawn a Job (legacy in-process indexing)
  mode: auto
  rbac:
    # Create the Role + RoleBinding letting the API SA clone the CronJob and
    # create Jobs in this namespace. Disable if you manage RBAC out-of-band.
    create: true
  # Scheduled full reindex (--all). Set suspendSchedule=true to keep the
  # template available for ad-hoc Jobs without running on a timer.
  schedule: "0 3 * * *"
  suspendSchedule: false
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  extraEnv: []
  nodeSelector: {}
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      memory: 4Gi

# --- Multi-channel bot workers (opt-in) -------------------------------------
# One role-gated worker Deployment per ENABLED channel (slack / telegram /
# discord), each with OPSRAG_ROLE=<name>bot. Teams is NOT a worker -- it is an
# inbound webhook served by the api role (set channels.teams.enabled to render
# it into the app config; expose the api Ingress publicly for the Bot
# Framework). Enabling a channel here ALSO flips it on in the mounted
# config.yaml (see configmap.yaml), so the in-app adapter boots. Tokens come
# from api.envFromSecret / secretRef, never inline.
channels:
  slack:
    enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
  telegram:
    enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
  discord:
    enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
  teams:
    # No worker Deployment -- webhook on the api role. enabled=true renders the
    # channels.teams block into config.yaml so the api mounts the Teams router.
    enabled: false

# --- Slack bot worker (opt-in) -- DEPRECATED alias for channels.slack -------
# Kept for one release. When channels.slack.enabled is false but
# slackBot.enabled is true, the slackbot worker Deployment still renders and
# the app mirrors slack_bot into channels.slack at config load. Migrate to
# `channels.slack`.
slackBot:
  enabled: false
  replicaCount: 1
  # Slack tokens come from envFromSecret / secretRef, never inline.
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

# --- Service account ---------------------------------------------------------
serviceAccount:
  create: true
  name: ""
  annotations: {}

# --- Ingress (opt-in) --------------------------------------------------------
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: opsrag.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# --- Config (rendered into a ConfigMap, mounted as config.yaml) --------------
# These mirror the app's config.yaml. MCP flags below drive both the ConfigMap
# and the OPSRAG_MCP_<NAME>_ENABLED env vars on the api container.
config:
  # Optional cloud model bundle: aws (Bedrock) | gcp (Vertex) | "" (none).
  # When set it fills UNSET model slots (llm/embedding/reranker/pro_model and
  # the per-purpose `models` block) with sane provider defaults -- no rebuild.
  # Precedence: OPSRAG_* env > explicit blocks below > cloud bundle default.
  # See values-aws.yaml / values-gcp.yaml for complete overlays.
  cloudProvider: ""
  llm:
    provider: anthropic
    model: claude-sonnet-4-20250514
    apiKeyEnv: ANTHROPIC_API_KEY
    # Cloud routing knobs (emitted only when set). aws_region for Bedrock;
    # project + location for Vertex.
    awsRegion: ""
    project: ""
    location: ""
  embedding:
    provider: fastembed
    model: BAAI/bge-small-en-v1.5
    # Embedding dimension MUST match the model AND the Qdrant collection.
    # Leave empty to let the cloud bundle default fill it (aws Cohere Embed v4
    # = 1536; gcp gemini-embedding-001 = 3072). Empty = provider default.
    dimension: ""
    awsRegion: ""
    project: ""
    location: ""
  # Optional reranker block (emitted only when provider set). The cloud bundle
  # fills this automatically (aws cohere.rerank-v3-5; gcp semantic-ranker).
  reranker: {}
    # provider: bedrock
    # model: cohere.rerank-v3-5:0
    # awsRegion: us-east-1
  # Image understanding (web UI + channel bots), ephemeral pass-through to a
  # vision-capable model. `model`/`provider` are an auto-route fallback used only
  # when the active llm.model can't see; left empty, a provider-aware default is
  # resolved at startup (Bedrock/Anthropic -> claude-sonnet-4-6; Vertex ->
  # gemini-3-flash-preview). Override at deploy time with OPSRAG_VISION_MODEL /
  # OPSRAG_VISION_PROVIDER / OPSRAG_VISION_ENABLED (no rebuild). See
  # values-aws.yaml / values-gcp.yaml for the cloud overlays.
  vision:
    enabled: true
    model: ""              # e.g. "anthropic.claude-sonnet-4-6-v1:0" to force a model
    provider: ""           # defaults to config.llm.provider
    maxImages: 4
    maxBytes: 5242880      # 5 MB per image
    allowedMime: ["image/png", "image/jpeg", "image/gif", "image/webp"]
  vectorStore:
    provider: qdrant
    url: http://qdrant:6333
    collection: opsrag
    # Set true ONLY for an intentional reindex after switching embedding models
    # (a silent dimension mismatch corrupts the shared Qdrant index + caches).
    allowDimensionChange: false
  knowledgeGraph:
    provider: none
  session:
    provider: postgres
    dsnEnv: POSTGRES_DSN
  observability:
    # LLM observability (Phoenix tracing). false -> the no-op "console"
    # provider; OpsRAG runs perfectly fine with NO Phoenix. Toggling this flag
    # flips the API config provider (phoenix <-> console) AND brings the
    # bundled Phoenix deployment (top-level `phoenix:` block) up/down -- no
    # image rebuild required.
    enabled: false
    projectName: opsrag
    # Use your OWN Phoenix collector instead of the bundled one. When set, the
    # bundled Phoenix deployment is NOT rendered and the API points here.
    externalEndpoint: ""
  # --- Multi-environment registry (Settings.environments) --------------------
  # One OpsRAG instance can target N environments; each bundles how to reach
  # that env's kubernetes + prometheus + elasticsearch. The k8s / prometheus /
  # elasticsearch MCP tools take an `env` arg resolved against this registry.
  # OMITTED by default: when `targets` is empty the engine SYNTHESIZES a
  # registry from the legacy k8s/elasticsearch/deployment blocks (back-compat).
  # Keys under each target MUST match config.py K8sTarget / PrometheusTarget /
  # EsTarget (extra="forbid"). See values-multi-env.yaml for the canonical shape.
  environments: {}
    # default: prod
    # targets:
    #   prod:
    #     kubernetes: { mode: kubeconfig, context: prod }
    #     prometheus: { reach: k8s_proxy, namespace: monitoring,
    #                   service: kube-prometheus-stack-prometheus, port: 9090 }
    #     elasticsearch: { reach: direct, url: https://es.example.com:9200,
    #                      api_key_env: ES_API_KEY_PROD }

# --- MCP integrations (all 14; disabled by default) --------------------------
# The key set MUST equal the MCPIntegration registry exactly (CI-enforced).
# Each `enabled` maps to OPSRAG_MCP_<NAME>_ENABLED on the api container.
# `secretRef` optionally names a Secret carrying that integration's credentials.
# Each connector: { enabled, secretRef, restricted }. `restricted: true` makes a
# connector off-by-default (usable only by users granted it via auth.roleConnectors
# or a per-user override in the admin UI); the `admin` role always has access.
# e.g.  datadog: { enabled: true, restricted: true }
mcp:
  aws:                  { enabled: false, secretRef: "" }
  azure:                { enabled: false, secretRef: "" }
  # Billing category — cost/spend connectors, restricted (admin/finops only).
  billing_datadog:      { enabled: false, secretRef: "", restricted: true }
  billing_gcp:          { enabled: false, secretRef: "", restricted: true }
  billing_kubecost:     { enabled: false, secretRef: "", restricted: true }
  billing_mongodb_atlas: { enabled: false, secretRef: "", restricted: true }
  cloudflare:           { enabled: false, secretRef: "" }
  cloudwatch:    { enabled: false, secretRef: "" }
  code:          { enabled: false, secretRef: "" }
  datadog:       { enabled: false, secretRef: "" }
  elasticsearch: { enabled: false, secretRef: "" }
  gcp:           { enabled: false, secretRef: "" }
  github:        { enabled: false, secretRef: "" }
  gitlab:        { enabled: false, secretRef: "" }
  grafana:       { enabled: false, secretRef: "" }
  knowledge:     { enabled: false, secretRef: "" }
  kubernetes:    { enabled: false, secretRef: "" }
  loki:          { enabled: false, secretRef: "" }
  pagerduty:     { enabled: false, secretRef: "" }
  prometheus:    { enabled: false, secretRef: "" }
  rootly:        { enabled: false, secretRef: "" }
  runbooks:      { enabled: false, secretRef: "" }
  sentry:        { enabled: false, secretRef: "" }
  slack:         { enabled: false, secretRef: "" }
  splunk:        { enabled: false, secretRef: "" }
  stackdriver:   { enabled: false, secretRef: "" }
  tool_cache:    { enabled: false, secretRef: "" }

# --- Opt-in Secret (operator can instead use envFromSecret) ------------------
secret:
  create: false
  # name defaults to <fullname>-secrets when create=true
  name: ""
  data: {}   # key: value pairs (stringData)

# --- Network policy (opt-in egress allowlist) --------------------------------
networkPolicy:
  enabled: false
  # Extra egress rules appended to the defaults (DNS + intra-namespace).
  egress: []

# --- Pod disruption budget ---------------------------------------------------
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# --- Horizontal pod autoscaler (api) -----------------------------------------
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

# --- Pod-level settings ------------------------------------------------------
podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
nodeSelector: {}
tolerations: []
affinity: {}
