apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "opsrag.fullname" . }}-config
  labels:
    {{- include "opsrag.labels" . | nindent 4 }}
data:
  config.yaml: |
    {{- /* cloud_provider selects a per-purpose model bundle (aws=Bedrock,
           gcp=Vertex). Only emitted when set so default behaviour (None) is
           unchanged. Explicit blocks + `models` + OPSRAG_* env always win. */}}
    {{- if .Values.config.cloudProvider }}
    cloud_provider: {{ .Values.config.cloudProvider }}
    {{- end }}
    auth:
      issuer: {{ .Values.auth.issuer | quote }}
      audience: {{ .Values.auth.audience | quote }}
      jwks_cache_seconds: {{ .Values.auth.jwksCacheSeconds | default 300 }}
    {{- /* api block: only the rate-limit knobs are config-surfaced here.
           rate_limit_backend=redis is fail-fast -- the API PINGs Redis at
           boot (redis_url_env), so only set it when Redis is reachable. */}}
    {{- if .Values.api.rateLimit }}
    api:
      {{- with .Values.api.rateLimit.backend }}
      rate_limit_backend: {{ . }}
      {{- end }}
      {{- with .Values.api.rateLimit.redisUrlEnv }}
      redis_url_env: {{ . }}
      {{- end }}
      {{- with .Values.api.rateLimit.rpm }}
      rate_limit_rpm: {{ . }}
      {{- end }}
    {{- end }}
    llm:
      provider: {{ .Values.config.llm.provider }}
      model: {{ .Values.config.llm.model }}
      api_key_env: {{ .Values.config.llm.apiKeyEnv }}
      {{- with .Values.config.llm.awsRegion }}
      aws_region: {{ . | quote }}
      {{- end }}
      {{- with .Values.config.llm.project }}
      project: {{ . | quote }}
      {{- end }}
      {{- with .Values.config.llm.location }}
      location: {{ . | quote }}
      {{- end }}
    embedding:
      provider: {{ .Values.config.embedding.provider }}
      model: {{ .Values.config.embedding.model }}
      {{- with .Values.config.embedding.dimension }}
      dimension: {{ . }}
      {{- end }}
      {{- with .Values.config.embedding.awsRegion }}
      aws_region: {{ . | quote }}
      {{- end }}
      {{- with .Values.config.embedding.project }}
      project: {{ . | quote }}
      {{- end }}
      {{- with .Values.config.embedding.location }}
      location: {{ . | quote }}
      {{- end }}
    {{- with .Values.config.reranker }}
    reranker:
      {{- with .provider }}
      provider: {{ . }}
      {{- end }}
      {{- with .model }}
      model: {{ . }}
      {{- end }}
      {{- with .awsRegion }}
      aws_region: {{ . | quote }}
      {{- end }}
      {{- with .project }}
      project: {{ . | quote }}
      {{- end }}
      {{- with .location }}
      location: {{ . | quote }}
      {{- end }}
    {{- end }}
    {{- with .Values.config.vision }}
    vision:
      enabled: {{ .enabled }}
      {{- with .model }}
      model: {{ . | quote }}
      {{- end }}
      {{- with .provider }}
      provider: {{ . | quote }}
      {{- end }}
      {{- with .maxImages }}
      max_images: {{ int . }}
      {{- end }}
      {{- with .maxBytes }}
      max_bytes: {{ int . }}
      {{- end }}
      {{- with .allowedMime }}
      allowed_mime: {{ toJson . }}
      {{- end }}
    {{- end }}
    vector_store:
      provider: {{ .Values.config.vectorStore.provider }}
      url: {{ .Values.config.vectorStore.url | quote }}
      collection: {{ .Values.config.vectorStore.collection }}
      {{- if .Values.config.vectorStore.allowDimensionChange }}
      allow_dimension_change: true
      {{- end }}
    knowledge_graph:
      provider: {{ .Values.config.knowledgeGraph.provider }}
    session:
      provider: {{ .Values.config.session.provider }}
      dsn_env: {{ .Values.config.session.dsnEnv }}
    observability:
      # enabled -> phoenix tracing; disabled -> the no-op "console" provider
      # (OpsRAG runs with no Phoenix). Same flag gates the bundled Phoenix
      # deployment, so the config and the collector can never drift.
      provider: {{ if .Values.config.observability.enabled }}phoenix{{ else }}console{{ end }}
      project_name: {{ .Values.config.observability.projectName }}
    mcp:
      {{- range $name, $cfg := .Values.mcp }}
      {{ $name }}:
        enabled: {{ $cfg.enabled }}
      {{- end }}
    {{- /* channels: render each channel's enabled flag so flipping a channel
           in values flips the in-app adapter. Token *_env names + allowlists +
           quotas use the app defaults unless an operator overrides them in a
           separate config layer; secrets are NEVER rendered here. slackBot is a
           deprecated alias -> ORs into channels.slack.enabled. */}}
    channels:
      slack:
        enabled: {{ or (.Values.channels.slack).enabled .Values.slackBot.enabled | default false }}
      telegram:
        enabled: {{ (.Values.channels.telegram).enabled | default false }}
      discord:
        enabled: {{ (.Values.channels.discord).enabled | default false }}
      teams:
        enabled: {{ (.Values.channels.teams).enabled | default false }}
    {{- /* Unified multi-environment registry (Settings.environments). Each
           target's kubernetes / prometheus / elasticsearch block is rendered
           verbatim, so the keys MUST match config.py's K8sTarget /
           PrometheusTarget / EsTarget (extra="forbid"). Omitted entirely when
           unset -> the engine synthesizes a registry from legacy blocks. */}}
    {{- with .Values.config.environments }}
    environments:
      {{- with .default }}
      default: {{ . }}
      {{- end }}
      targets:
        {{- toYaml .targets | nindent 8 }}
    {{- end }}
