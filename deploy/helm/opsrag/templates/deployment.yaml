apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opsrag.fullname" . }}
  labels:
    {{- include "opsrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "opsrag.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "opsrag.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "opsrag.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: api
          image: {{ include "opsrag.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
          env:
            - name: OPSRAG_ROLE
              value: api
            - name: OPSRAG_CONFIG
              value: /etc/opsrag/config.yaml
            - name: OPSRAG_PORT
              value: {{ .Values.api.port | quote }}
            {{- if .Values.indexJob.enabled }}
            # Indexing trigger: spawn an ephemeral Job (cloned from the
            # indexer CronJob) instead of indexing in-process, so these
            # serving pods stay pure-serving. mode=auto -> Job in-cluster.
            - name: OPSRAG_INDEX_JOB_MODE
              value: {{ .Values.indexJob.mode | quote }}
            - name: OPSRAG_JOB_CRONJOB_NAME
              value: {{ include "opsrag.fullname" . }}-indexer
            - name: OPSRAG_JOB_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- end }}
            {{- include "opsrag.mcpEnv" . | nindent 12 }}
            {{- with .Values.api.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- $mcpSecretRefs := include "opsrag.mcpSecretRefs" . }}
          {{- if or .Values.api.envFromSecret (trim $mcpSecretRefs) }}
          envFrom:
            {{- if .Values.api.envFromSecret }}
            - secretRef:
                name: {{ .Values.api.envFromSecret }}
            {{- end }}
            {{- with $mcpSecretRefs }}
            {{- . | nindent 12 }}
            {{- end }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/opsrag
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: {{ include "opsrag.fullname" . }}-config
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
