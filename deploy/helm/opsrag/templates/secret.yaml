{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.name | default (printf "%s-secrets" (include "opsrag.fullname" .)) }}
  labels:
    {{- include "opsrag.labels" . | nindent 4 }}
type: Opaque
{{- with .Values.secret.data }}
stringData:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}
