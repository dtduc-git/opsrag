{{- if .Values.slackBot.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opsrag.fullname" . }}-slackbot
  labels:
    {{- include "opsrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: slackbot
spec:
  replicas: {{ .Values.slackBot.replicaCount }}
  selector:
    matchLabels:
      {{- include "opsrag.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: slackbot
  template:
    metadata:
      labels:
        {{- include "opsrag.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: slackbot
    spec:
      serviceAccountName: {{ include "opsrag.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: slackbot
          image: {{ include "opsrag.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: OPSRAG_ROLE
              value: slackbot
            - name: OPSRAG_CONFIG
              value: /etc/opsrag/config.yaml
            {{- include "opsrag.mcpEnv" . | nindent 12 }}
          {{- if .Values.api.envFromSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.api.envFromSecret }}
          {{- end }}
          resources:
            {{- toYaml .Values.slackBot.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/opsrag
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "opsrag.fullname" . }}-config
{{- end }}
