apiVersion: v1
kind: Pod
metadata:
  name: {{ include "opsrag.fullname" . }}-test-connection
  labels:
    {{- include "opsrag.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.10.1
      command: ["curl", "-sf", "http://{{ include "opsrag.fullname" . }}:{{ .Values.api.service.port }}/healthz"]
