{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "opsrag.fullname" . }}
  labels:
    {{- include "opsrag.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "opsrag.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    # DNS resolution.
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Intra-namespace traffic (Postgres, Qdrant, etc. in the same namespace).
    - to:
        - namespaceSelector: {}
    {{- with .Values.networkPolicy.egress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
