{{- if and .Values.indexJob.enabled .Values.indexJob.rbac.create }}
# Narrow RBAC so the API ServiceAccount can spawn ad-hoc indexing Jobs by
# cloning the template CronJob (JobLauncher). Scoped to this namespace only --
# read the template CronJob + manage Jobs; nothing else.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "opsrag.fullname" . }}-indexjob
  labels:
    {{- include "opsrag.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "opsrag.fullname" . }}-indexjob
  labels:
    {{- include "opsrag.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "opsrag.fullname" . }}-indexjob
subjects:
  - kind: ServiceAccount
    name: {{ include "opsrag.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
