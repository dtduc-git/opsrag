# =============================================================================
# opsrag - LOCAL DEMO config for the docker-compose stack
# =============================================================================
# Mounted into the api container at /app/config.yaml (see docker-compose.yaml),
# overriding the image's shipped default. This demo runs in first-party LOGIN
# mode (the only modes are `login` and `oidc` -- there is NO anonymous/open
# mode). On a fresh `docker compose up`, sign in as the seeded admin:
#
#   - Browse the UI at http://localhost:5173 -> you'll get the login page.
#   - Credentials are the seeded admin from OPSRAG_ADMIN_EMAIL /
#     OPSRAG_ADMIN_PASSWORD in deploy/compose/.env (defaults in .env.example:
#     admin@opsrag.local / change-me-admin -- CHANGE for any real use).
#   - Login requires OPSRAG_SESSION_SIGNING_KEY (also from .env) to sign the
#     session cookie.
#
# The `auth:` block below uses cookie_secure:false because this demo serves
# plain http://localhost (no TLS). Behind HTTPS you MUST set cookie_secure:true
# (and enable SSO via an `sso:` block) -- see config-example.yaml.
#
# Secrets (ANTHROPIC_API_KEY, POSTGRES_DSN override, MCP creds, the auth env
# above) come from deploy/compose/.env (git-ignored; copy from .env.example).
# Connection strings to the sibling compose services are injected via
# `environment:` in docker-compose.yaml.
# =============================================================================

# First-party LOGIN mode: built-in admin (seeded from env) + signed cookie
# sessions. Authentication is ALWAYS enforced -- unauthenticated requests get
# 401 (except the public allowlist: /healthz, /readyz, /auth/*, /ui-config...).
auth:
  mode: login
  login:
    password_enabled: true
    cookie_secure: false            # local http demo (no TLS); MUST be true behind HTTPS
    sso_callback_base: "http://localhost:5173/api"

llm:
  provider: anthropic            # ANTHROPIC_API_KEY supplied via .env
  model: claude-sonnet-4-20250514
  api_key_env: ANTHROPIC_API_KEY
  max_tokens: 4096

# Image understanding (web UI + channel bots), ephemeral. The Anthropic model
# above already sees, so no fallback is built. Override via OPSRAG_VISION_MODEL.
vision:
  enabled: true
  model: null                    # null -> provider-aware default
  provider: null                 # null -> llm.provider

embedding:
  provider: fastembed            # local, no API key
  model: BAAI/bge-small-en-v1.5

vector_store:
  provider: qdrant
  url: http://qdrant:6333
  collection: opsrag

knowledge_graph:
  provider: none                 # null backend (FR-019)

session:
  provider: postgres
  dsn_env: POSTGRES_DSN

memory:
  provider: memory

observability:
  provider: console
  project_name: opsrag

entity_extraction:
  method: rule_based

agent:
  mode: full                     # full | minimal  (legacy 'hybrid' lane removed)
  top_k: 10
  rerank_top_k: 5
  max_retries: 3

# All 14 MCP integrations disabled for the baseline demo (corpus-only answers).
# Real credentials are present in .env, so you can flip any of these to true and
# restart to exercise that integration.
mcp:
  aws:           { enabled: false }
  azure:         { enabled: false }
  cloudflare:    { enabled: false }
  code:          { enabled: false }
  datadog:       { enabled: false }
  elasticsearch: { enabled: false }
  gcp:           { enabled: false }
  github:        { enabled: false }
  gitlab:        { enabled: false }
  grafana:       { enabled: false }
  knowledge:     { enabled: false }
  kubernetes:    { enabled: false }
  loki:          { enabled: false }
  prometheus:    { enabled: false }
  rootly:        { enabled: false }
  runbooks:      { enabled: false }
  sentry:        { enabled: false }
  slack:         { enabled: false }
  splunk:        { enabled: false }
  tool_cache:    { enabled: false }
