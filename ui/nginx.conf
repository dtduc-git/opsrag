## OpsRAG UI nginx - proxies /api/* to the opsrag-api backend.
##
## The local docker-compose demo runs a single api service (opsrag-api:8080)
## that handles every route, so all /api/* locations below point at it. A
## production deployment may split query (backend) vs indexer roles onto
## separate services; if so, repoint the indexer-specific locations
## (/api/indexing, /api/index, /api/admin) at that indexer upstream.

server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    ## ── Hashed bundles — cache forever ─────────────────────────
    ## Vite emits content-hashed filenames (`index-<hash>.js`,
    ## `index-<hash>.css`). They're immutable by construction:
    ## different bytes = different filename. Tell browsers AND
    ## upstream CDNs (Cloudflare) to keep them in cache indefinitely.
    ##
    ## `try_files $uri =404` is critical: a request for a
    ## non-existent hashed asset MUST 404, not fall through to
    ## index.html. The HTML-for-JS fallthrough is what caused the
    ## blank-page bug when Cloudflare cached an old index.html that
    ## referenced a now-deleted bundle hash.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    ## ── index.html / SPA shell — never cache ───────────────────
    ## Every deploy ships a new index.html that references new
    ## hashed bundle names. If a CDN caches this file, browsers
    ## keep asking for stale bundle names until the cache expires.
    ## Force-revalidate on every request — the file is ~1 KB, so
    ## the bandwidth cost is negligible.
    location = / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files /index.html =404;
    }
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }

    ## ── SPA fallback for client-side routes ────────────────────
    ## Unknown paths (e.g. /chat, /usage) get served the SPA shell
    ## so the React router can pick them up. Same no-cache policy.
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files $uri $uri/ /index.html;
    }

    ## ── Indexer routes ─────────────────────────────────────────
    ## Order matters: more-specific locations must precede the
    ## generic /api/ fallback. nginx picks the longest prefix.
    location /api/indexing/ {
        proxy_pass http://opsrag-api:8080/indexing/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    location /api/index/ {
        proxy_pass http://opsrag-api:8080/index/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    location /api/admin/ {
        proxy_pass http://opsrag-api:8080/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    ## ── Backend (default) ──────────────────────────────────────
    location /api/ {
        proxy_pass http://opsrag-api:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        # SSE support for /query streams
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }
}
