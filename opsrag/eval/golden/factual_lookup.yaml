# factual_lookup -- single-doc fact extraction.
# Each query has one (rarely two) expected source files. The answer must
# contain literal substrings that exist in the source file content.

- id: factual_001
  category: factual_lookup
  query: "What stages does generic-pipeline.yaml define in gitops-pipeline-templates?"
  expected_sources:
    - devops/gitops-pipeline-templates/generic-pipeline.yaml
  must_contain:
    - "delivery"
    - "cleanup"
    - "build"
  must_not_contain:
    - "context does not contain"
    - "I don't have access"
  notes: "Direct fact extraction from a single YAML file."

- id: factual_002
  category: factual_lookup
  query: "What chart name and version is declared in base-charts/generic-application's Chart.yaml?"
  # OR-semantics example: this question has multiple valid groundings.
  # The literal Chart.yaml AND the prose doc that describes it both
  # contain `name: genapp` / `version: v0.2.5` -- either surfacing in
  # top-N is a correct grounding. With strict AND on expected_sources,
  # the bot got punished for picking the more semantically-rich .md
  # doc over the sparse .yaml; both are factually equivalent here.
  expected_sources: []
  acceptable_sources:
    - devops/base-charts/generic-application/Chart.yaml
    - devops/sre/sre-knowledge-base/docs/platform/generic-application.md
  must_contain:
    - "name:"
  must_not_contain:
    - "I don't know"
    - "cannot find"
  notes: "Helm Chart.yaml metadata extraction. Uses acceptable_sources (OR) -- the .yaml and the prose .md describing it are interchangeable groundings for this fact."

- id: factual_003
  category: factual_lookup
  query: "What does the .gitversion_function template do in gitops-pipeline-templates?"
  expected_sources:
    - devops/gitops-pipeline-templates/library/.gitversion.yaml
  must_contain:
    - "GitVersion"
  must_not_contain:
    - "not provided"
    - "not described"
  notes: "Library template purpose extraction."

- id: factual_004
  category: factual_lookup
  query: "What ARGOCD_SYNC_WAIT_TIMEOUT value does the pipeline-templates README recommend?"
  expected_sources:
    - devops/gitops-pipeline-templates/README.md
  must_contain:
    - "600"
  must_not_contain:
    - "cannot find"
    - "no information"
  notes: "Numeric value extraction from README."

- id: factual_005
  category: factual_lookup
  query: "What variables does the apps_variables.tf file in projects/staging/apps/qa-runner declare?"
  expected_sources:
    - devops/terraform2.0/acme-tf-state/terraform/projects/staging/apps/qa-runner/apps_variables.tf
  must_contain:
    - "variable"
  must_not_contain:
    - "does not contain"
    - "I cannot find"
  notes: "Terraform variable enumeration from a single .tf file."

# -- Tuning regression suite (Tasks 10-13, 2026-05-05) --

- id: factual_006
  category: factual_lookup
  query: "Which repository handles ArgoCD configuration?"
  expected_sources:
    - devops/sre/sre-knowledge-base/docs/platform/gitops-monorepo.md
    - devops/gitops/values/bootstrap/bootstrap/prod.yaml
  must_contain:
    - "gitops-monorepo"
    - "argocd"
  must_not_contain:
    - "context does not contain"
    - "I don't have access"
  notes: |
    Regression for session 756c0aa5 Q1: pre-fix answer named ONLY
    "argocd-automation-access" because _detect_repo lexical-matched on
    "argocd" -> first repo containing "argocd" -> wrong repo. Post-fix
    (Task 10), bare-slug detection on "argocd" stays in soft mode (no
    Qdrant filter), retrieval surfaces gitops-monorepo files, and the
    generation prompt (Task 12, source-paths-as-evidence rule) makes the
    LLM lead with gitops-monorepo as primary handler.
