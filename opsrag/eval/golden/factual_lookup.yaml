# Factual-lookup goldens over the shipped `samples/` corpus.
# expected_sources / acceptable_sources are paths RELATIVE TO samples/.
# must_contain literals are verified to appear verbatim in the referenced file.
- id: factual_001
  category: factual_lookup
  query: "What CPU utilization does the acme-notes-api HPA target, and what are its min/max replicas?"
  expected_sources: []
  acceptable_sources:
    - manifests/acme-notes-api.yaml
    - runbooks/003-acme-notes-scaling.md
  must_contain:
    - "70"
    - "3"
    - "12"
  must_not_contain:
    - "I don't know"
  notes: |
    The HPA fact lives in BOTH the manifest (averageUtilization: 70,
    minReplicas 3 / maxReplicas 12) and the scaling runbook ("HPA targeting
    70% CPU, min 3 / max 12 replicas") -- either is a correct grounding,
    hence acceptable_sources (OR-semantics).

- id: factual_002
  category: factual_lookup
  query: "How do I roll back an acme-notes deploy?"
  expected_sources:
    - runbooks/001-acme-notes-deploy.md
  must_contain:
    - "rollout undo"
  must_not_contain:
    - "I don't know"
  notes: "Rollback command `kubectl ... rollout undo deploy/acme-notes-api`."

- id: factual_003
  category: factual_lookup
  query: "How do I promote the acme-notes standby database?"
  expected_sources:
    - runbooks/002-acme-notes-db-failover.md
  must_contain:
    - "pg_ctl promote"
  must_not_contain:
    - "I don't know"
  notes: "Standby promotion command from the DB failover runbook."

- id: factual_004
  category: factual_lookup
  query: "How do I do a full flush of the acme-notes cache?"
  expected_sources:
    - runbooks/005-acme-notes-cache-flush.md
  must_contain:
    - "flushdb"
  must_not_contain:
    - "I don't know"
  notes: "Full-flush (last resort) command `redis-cli flushdb`."

- id: factual_005
  category: factual_lookup
  query: "What is the acme-notes API p95 latency SLO?"
  expected_sources: []
  acceptable_sources:
    - runbooks/003-acme-notes-scaling.md
    - postmortems/2026-02-03-acme-notes-api-latency.md
  must_contain:
    - "300"
  must_not_contain:
    - "I don't know"
  notes: |
    The 300 ms p95 SLO appears in the scaling runbook ("under the 300 ms SLO")
    and the latency postmortem ("Latency SLO (300 ms p95)") -- either grounds
    the answer.

- id: factual_006
  category: factual_lookup
  query: "What deployment update strategy does the acme-notes-api Deployment use?"
  expected_sources: []
  acceptable_sources:
    - manifests/acme-notes-api.yaml
    - runbooks/001-acme-notes-deploy.md
  must_contain:
    - "RollingUpdate"
    - "maxSurge"
  must_not_contain:
    - "I don't know"
  notes: |
    RollingUpdate with maxSurge 1 / maxUnavailable 0 -- stated in the manifest
    spec and described in the deploy runbook.

- id: factual_007
  category: factual_lookup
  query: "What is the backup retention period for the acme-notes primary database?"
  expected_sources:
    - terraform/main.tf
  must_contain:
    - "retention_days"
    - "14"
  must_not_contain:
    - "I don't know"
  notes: "Terraform db backup block: retention_days = 14, point_in_time_recovery."

- id: factual_008
  category: factual_lookup
  query: "How many days before a signing certificate expires should acme-notes alert?"
  expected_sources:
    - postmortems/2026-03-20-acme-notes-auth-outage.md
  must_contain:
    - "14 days"
  must_not_contain:
    - "I don't know"
  notes: "Auth-outage action item: alert 14 days before any signing cert expires."

- id: factual_009
  category: factual_lookup
  query: "What disk-usage alert threshold did the acme-notes DB outage recommend?"
  expected_sources:
    - postmortems/2026-01-15-acme-notes-db-outage.md
  must_contain:
    - "85%"
  must_not_contain:
    - "I don't know"
  notes: "Action item: lower the disk-usage alert to 85% with a page at 92%."
