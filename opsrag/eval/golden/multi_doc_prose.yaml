# multi_doc_prose -- T1.1 validation goldens (2026-05-19).
#
# Five prose-shape multi-doc queries authored to exercise the T1.1
# multi-query-decomposer code path. The pre-existing multi_doc_synthesis
# goldens reference YAML filenames and pipeline templates, so triage
# routes them to `code_grep` -- which means T1.1 (wired in the
# `knowledge_search` MCP tool) never fires on that subset.
#
# These goldens use "according to / per / the runbook says" phrasing
# and named subject matter (CloudSQL access rule, Cloudflare DNS,
# ArgoCD, CrashLoopBackOff, Kafka consumer lag, SLO audit) drawn from
# the existing confluence.yaml + runbook_howto.yaml answers -- so the
# ground-truth anchors are already known to exist in the corpus.
#
# Triage should route ALL five to knowledge_search (not code_grep)
# because no YAML file paths, kebab-service-names, or function names
# appear in the question text. The T1.1 heuristic should match each
# one via the case-sensitive ", AND <wh-word>" pattern.
#
# Pre-T1.1 baseline (OPSRAG_DECOMPOSE_QUERIES=0): expect single-shot
# retrieval, often misses one of the two anchors.
# Post-T1.1 (OPSRAG_DECOMPOSE_QUERIES=1): expect two sub-queries, both
# anchors retrieved, source_recall >= 0.5.

- id: prose_001
  category: multi_doc_prose
  query: |
    According to the SRE wiki, what is the IAM Database CloudSQL
    Access Rule, AND according to the runbook, what's the first
    thing to check when the Celery worker offline alert fires for
    acme-notes-be?
  expected_sources:
    - 5355798530:iam-database-cloudsql-access-rule.md
    - devops/sre/sre-knowledge-base/docs/runbooks/celery/the-celery-worker-is-offline.md
  must_contain:
    - "Cloud SQL"
    - "celery"
  must_not_contain:
    - "context does not contain"
    - "I don't have access"
  notes: |
    Pairs an SRE Confluence policy page with a service-specific runbook.
    Single-shot retrieval typically hits only one source; T1.1 should
    fan into two sub-queries and pick up both anchors via RRF.

- id: prose_002
  category: multi_doc_prose
  query: |
    According to Confluence, how do we manage Cloudflare DNS records
    with ExternalDNS in Kubernetes, AND how do we right-size
    Kubernetes workloads using Prometheus and VictoriaMetrics?
  expected_sources:
    - 5286559778:managing-cloudflare-dns-records-with-externaldns-in-kubernet.md
    - 5451448427:kubernetes-workload-rightsizing-with-prometheus-victoriametrics.md
  must_contain:
    - "ExternalDNS"
    - "VictoriaMetrics"
  must_not_contain:
    - "context does not contain"
    - "no information"
  notes: |
    Two distinct Confluence pages, both Kubernetes-adjacent but with
    non-overlapping anchors. Dense retrieval will surface the closer
    one; T1.1 decomposition should retrieve both.

- id: prose_003
  category: multi_doc_prose
  query: |
    What does the runbook say to do when the ArgoCD UI is down,
    AND what diagnosis steps does the platform documentation
    prescribe for an Elasticsearch unassigned-shards alert?
  expected_sources:
    - devops/sre/sre-knowledge-base/docs/runbooks/argocd/argocd-ui-is-down.md
    - devops/sre/sre-knowledge-base/docs/runbooks/elasticsearch/elasticsearch-has-unassigned-shards.md
  must_contain:
    - "argocd"
    - "shard"
  must_not_contain:
    - "context does not contain"
    - "no procedure"
  notes: |
    Two SRE runbooks from different subsystems. Both have populated
    alerts: frontmatter (post-2026-05-02 cleanup), so retrieval should
    surface them -- but only with multi-query fan-out.

- id: prose_004
  category: multi_doc_prose
  query: |
    Per the Confluence procedure, what is the process to get access
    to CloudSQL instances, AND per the Kubernetes runbook, how
    should one respond when an application pod is stuck in
    CrashLoopBackOff?
  expected_sources:
    - 3536323499:procedure-to-get-access-to-cloudsql-instances.md
    - devops/sre/sre-knowledge-base/docs/runbooks/kubernetes/application-pod-is-under-crashloopbackoff.md
  must_contain:
    - "CloudSQL"
    - "kubectl"
  must_not_contain:
    - "I cannot determine"
    - "context does not contain"
  notes: |
    Confluence procedural page paired with a K8s runbook. Notable
    because howto_006 was previously flagged as a weak retrieval --
    pairing it with a CloudSQL access query gives T1.1 a clear
    opportunity to lift the weaker anchor via cross-pool RRF.

- id: prose_005
  category: multi_doc_prose
  query: |
    According to the SLO Audit Methodology page, what does the
    methodology describe, AND according to the Kafka consumer-lag
    runbook, what diagnosis steps should be taken when a topic has
    consumer lag?
  expected_sources:
    - 764314729:slo-audit-methodology.md
    - devops/sre/sre-knowledge-base/docs/runbooks/kafka/kafka-topic-has-consumer-lag.md
  must_contain:
    - "SLO"
    - "consumer"
  must_not_contain:
    - "context does not contain"
    - "no information"
  notes: |
    SLO methodology page (Confluence) paired with the Kafka
    consumer-lag platform runbook. Two distinct corpora, two
    distinct subjects -- exactly the shape T1.1 was designed for.
