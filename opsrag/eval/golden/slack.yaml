# slack -- Phase 2 connector regression suite (2026-05-07).
# Locks the #devops channel ingestion (108 threads, 566 chunks live).
# Each query targets distinct human-authored content from the indexed
# threads. Bot-rooted alerts are filtered out at format time, so
# anchors point at the human reply content underneath.
#
# `expected_sources` use the OpsRAG path convention for Slack:
#   <channel>/thread-<ts>.md  (under repo `slack:CC448TKTQ`).

- id: slack_001
  category: slack
  query: "What did the team say about apache-superset on staging being down sometimes?"
  expected_sources:
    - devops/thread-1776352353.998679.md
  must_contain:
    - "superset"
  must_not_contain:
    - "no relevant context"
    - "I don't have access"
  notes: |
    Locks recall of an organic debugging discussion in #devops where
    Engineer A, Engineer B, Engineer C and Engineer D diagnosed an
    apache-superset staging downtime (April 16, 2026). Validates that
    Slack threads with multi-author resolution chatter are surfaced.

- id: slack_002
  category: slack
  query: "What kinds of SRE Support Requests are submitted via the alerts bot in #devops?"
  must_contain:
    - "SRE Support"
  must_not_contain:
    - "no context was retrieved"
  notes: |
    No expected_sources because the SRE Support pattern shows up
    across dozens of threads. We only assert the answer references the
    pattern. Validates that the alert template surfaces in
    retrieval -- these are the most-common shape of indexed content.

- id: slack_003
  category: slack
  query: "Which services have had recent SRE support requests for Database access in #devops?"
  must_contain:
    - "Database"
  must_not_contain:
    - "no relevant context"
    - "I don't have access"
  notes: |
    Service-by-request-type query. Validates that retrieval can pull
    multiple matching threads (acme-notes-be, document-validator at
    minimum) when the query asks about a specific request_type
    appearing in alert templates.
