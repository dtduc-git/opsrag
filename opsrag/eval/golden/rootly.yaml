# rootly -- Phase 2 connector regression suite (2026-05-07).
# Locks the Rootly incidents + post-mortems ingestion (79 incidents,
# 1072 chunks live). Each query targets distinct, source-anchored
# content so this set survives both prompt churn and reindexing.
#
# `expected_sources` use the OpsRAG path convention for Rootly:
#   incidents/incident-<seq>-<slug>.md  (under repo `rootly:org`).

- id: rootly_001
  category: rootly
  query: "What was Rootly incident #40 'Integration API system is down' about, and what caused it?"
  expected_sources:
    - incidents/incident-40-integration-api-sytem-is-down.md
  must_contain:
    - "Kafka"
    - "integration-api"
  must_not_contain:
    - "no context was retrieved"
    - "I don't have access"
  notes: |
    Locks recall of an incident with a substantial post-mortem narrative
    (Leadup, Incident Cause Overview, Recovery, Improvement Action Plan).
    Anchors on "Kafka" and "integration-api" -- both appear repeatedly in
    the post-mortem body so chunk drift won't break this assertion.

- id: rootly_002
  category: rootly
  query: "Tell me about Rootly incident 289 where users were forced to log out due to incorrect security alerts"
  expected_sources:
    - incidents/incident-289-users-are-forced-to-log-out-and-unable-to-log-in-due-to-incorrect-security-alert.md
  must_contain:
    - "Production"
    - "Mobile"
  must_not_contain:
    - "no context was retrieved"
  notes: |
    Recent (2026-03-13) mitigated incident. Validates that direct
    incident-number queries surface the right doc as the top citation,
    matching the manual smoke test we ran on 2026-05-07.

- id: rootly_003
  category: rootly
  query: "Have we had any incidents about CN users being unable to log in or seeing blank pages?"
  expected_sources:
    - incidents/incident-108-blank-page-when-cn-users-login-to-rise.md
  must_contain:
    - "CN"
  must_not_contain:
    - "no relevant context"
  notes: |
    Validates retrieval by problem description (no incident number
    provided). The CN-login family of incidents is recurring so the
    retriever should comfortably find at least one match.

- id: rootly_004
  category: rootly
  query: "Which Rootly incidents have involved Kafka service issues?"
  expected_sources:
    - incidents/incident-40-integration-api-sytem-is-down.md
  must_contain:
    - "Kafka"
  must_not_contain:
    - "I don't have access"
    - "no context"
  notes: |
    Service-substring query. Tests that when a user mentions a specific
    technology (Kafka), the retriever surfaces incidents where that
    service was implicated in the failure -- even when the incident title
    doesn't name the service directly.

- id: rootly_005
  category: rootly
  query: "What was the mitigation for the recent incident where users couldn't log in to mobile devices in March 2026?"
  expected_sources:
    - incidents/incident-289-users-are-forced-to-log-out-and-unable-to-log-in-due-to-incorrect-security-alert.md
  must_contain:
    - "mobile"
    - "session"
  must_not_contain:
    - "no relevant"
  notes: |
    Tests synthesis: the answer should describe the mitigation
    (force-upgrade to latest mobile app + session expiry) using content
    from the Mitigation section of #289. The "session" anchor catches
    the specific mechanism described in that section.
