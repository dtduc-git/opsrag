# -- Pattern 8: quote-anchored --
# Failure mode: bot can't surface a specific phrase that exists in the
# corpus, OR fabricates context around the phrase.

# adv_quoted_001 (imgproxy/an engineer/expires) DISCARDED 2026-05-07 -- Faith sigma=0.408
# at n=6 (1.0 outlier in r1, 0.0 x 5 thereafter, byte-identical answer via cache).
# Long Slack thread is genuinely judge-ambiguous: an engineer has multi-turn role
# (asks clarifying questions early, proposes solution late). Judge can't decide
# whether the bot's detailed `expires` recipe is "supported by an engineer's proposal"
# or "extrapolated from his clarifying questions." No anchor refinement recovers
# this -- the source content is structurally ambiguous. Replace candidate (if
# desired) should anchor on a single-turn unambiguous quote, not a multi-turn
# conversation arc.

- id: adv_quoted_002
  category: adversarial
  query: |
    Per acme-notes-be's incident-profile, what is the named primary Cloud SQL
    "main" instance for acme-notes-be's write path?
  expected_sources:
    - devops/sre/sre-knowledge-base/docs/services/acme-notes-be/incident-profile.md
  must_contain:
    - "acme-notes-pg16"
  must_not_contain:
    - "no instance is named"
    - "the instance name is not specified"
  expected_baseline_faith: 1.00
  notes: |
    Sensitivity: [GREEN] stable.
    Pattern 8 (quote-anchored). The exact instance name
    `acme-notes-pg16` appears in incident-profile's Hot Dependencies
    table. Single-anchor concrete. Source: acme-notes-be/incident-profile.md.

- id: adv_quoted_003
  category: adversarial
  query: |
    Per the IAM Database CloudSQL Access Rule's troubleshooting section,
    what command does the page recommend running if database access
    fails after the 30-minute IAM propagation wait?
  expected_sources:
    - 5355798530:iam-database-cloudsql-access-rule.md
  must_contain:
    - "gcloud auth"
  must_not_contain:
    - "no command is recommended"
    - "the page does not specify"
  expected_baseline_faith: 1.00
  notes: |
    Sensitivity: [GREEN] stable.
    Pattern 8 (quote-anchored). Section 7 (Troubleshooting) literally
    contains `gcloud auth application-default login && gcloud auth login`
    with surrounding context about IAM token re-fetch. Verified
    2026-05-07. Source: iam-database-cloudsql-access-rule.md.

# -- Pattern 9: code+narrative fusion --
# Failure mode: bot pulls the runbook OR the command but not both. Tests
# whether retrieval surfaces chunks that contain BOTH narrative steps
# and concrete shell commands.

# adv_codenarr_001 (celery 5% + kubectl) DISCARDED 2026-05-07 -- Faith sigma=0.164
# at n=6 (just above 0.15 threshold; scores 0.3, 0.0, 0.0, 0.3, 0.3, 0.0). The
# kubectl command IS in the source runbook but lives in a child chunk that
# isn't reliably retrieved for this query -- bot fabricates plausible kubectl
# commands and judge correctly flags as fabrication, but with boundary scoring.
# Real failure mode (chunking/retrieval surfaces partial content) but anchor
# punishes it inconsistently. Replacement should pick a runbook where the
# kubectl command appears in the SAME chunk as the threshold/narrative.

- id: adv_codenarr_002
  category: adversarial
  query: |
    Per the IAM CloudSQL Access Rule, after waiting 30 minutes for IAM
    sync propagation, if access still fails what's the gcloud command
    sequence to refresh the user's group token?
  expected_sources:
    - 5355798530:iam-database-cloudsql-access-rule.md
  must_contain:
    - "gcloud auth"
    - "30 minute"
  must_not_contain:
    - "no command needed"
  expected_baseline_faith: 1.00
  notes: |
    Sensitivity: [YELLOW] neutral.
    Pattern 9 (code+narrative). Section 7 of the IAM page combines the
    "minimum 30 minutes" wait narrative with the explicit
    `gcloud auth application-default login && gcloud auth login`
    command. Both verified 2026-05-07. Source: same as adv_quoted_003
    but combined with the wait-narrative requirement.

- id: adv_codenarr_003
  category: adversarial
  query: |
    Per the kubernetes pod-start-waiting-too-long runbook, when a pod
    is stuck in waiting state, what is the kubectl command you'd run
    to inspect that pod's events and the resource constraints?
  expected_sources:
    - devops/sre/sre-knowledge-base/docs/runbooks/kubernetes/pod-start-waiting-too-long.md
  must_contain:
    - "kubectl"
    - "describe"
  must_not_contain:
    - "no command is documented"
  expected_baseline_faith: 1.00
  notes: |
    Sensitivity: [YELLOW] neutral.
    Pattern 9 (code+narrative). The pod-start-waiting runbook has
    `kubectl -n $NAMESPACE describe pod $POD` in its diagnostic step.
    Both verified 2026-05-07. Source: kubernetes/pod-start-waiting-
    too-long.md.

# -- Pattern 7: negated query --
# Failure mode: bot confabulates a list of items that are NOT in scope, OR
# inverts the affirmative content. Anchor on concrete factual exclusions
# present in the source doc (so the answer is verifiable), and use
# MustNotContain to catch the inversion-flip failure mode.

- id: adv_negated_001
  category: adversarial
  query: |
    Per the IAM Database CloudSQL Access Rule, what types of data stores
    and access patterns are NOT covered by this policy?
  expected_sources:
    - 5355798530:iam-database-cloudsql-access-rule.md
  must_contain:
    - "BigQuery"
    - "Firestore"
    - "Spanner"
    - "service account"
  must_not_contain:
    - "PostgreSQL is excluded"
    - "Cloud SQL is not covered"
    - "all stores are covered"
  expected_baseline_faith: 1.00
  notes: |
    Sensitivity: [GREEN] stable.
    Pattern 7 (negated). The IAM page lists TWO exclusion buckets verbatim:
    (1) "Service account access or application-level database connectivity"
    and (2) "Access to non-CloudSQL data stores (e.g., BigQuery, Firestore,
    Cloud Spanner)." MustContain enumerates ALL three data-store examples
    plus the service-account bucket -- partial answers (e.g., listing only
    BigQuery + Spanner) must fail. Query expanded 2026-05-07 to "data
    stores AND access patterns" so the answer naturally covers both
    exclusion buckets. Anchors verified against retrieved chunks
    2026-05-07. MustNotContain catches the inverse-flip failure mode.

- id: adv_negated_002
  category: adversarial
  query: |
    Per generic-pipeline.yaml's `include` rules, under what conditions is
    preview.yaml NOT included in the pipeline?
  expected_sources:
    - devops/gitops-pipeline-templates/generic-pipeline.yaml
  must_contain:
    - "MERGE_REQUEST_LABELS"
    - "MERGE_REQUEST_IID"
  must_not_contain:
    - "always included"
    - "never included"
    - "preview.yaml is unconditional"
  expected_baseline_faith: 1.00
  notes: |
    Sensitivity: [GREEN] stable.
    Pattern 7 (negated). The include rule reads
    `if: "$CI_MERGE_REQUEST_IID && $CI_MERGE_REQUEST_LABELS =~ /preview/"`.
    The negation has TWO conditions (compound `&&`): preview.yaml is NOT
    included when (a) `CI_MERGE_REQUEST_IID` is null -- i.e. the pipeline
    is not running in an MR context, OR (b) `CI_MERGE_REQUEST_LABELS`
    doesn't match the `/preview/` pattern. MustContain enumerates BOTH
    env-var anchors so a partial answer (only one half) fails. Query
    pluralized to "conditions" 2026-05-07 to invite both halves. Anchors
    verified 2026-05-07.

- id: adv_negated_003
  category: adversarial
  query: |
    Per the IAM Database CloudSQL Access Rule, which of the two Level 1
    Business Approval options does NOT involve someone from the team that
    owns the target database?
  expected_sources:
    - 5355798530:iam-database-cloudsql-access-rule.md
  must_contain:
    - "Option B"
    - "requester"
  must_not_contain:
    - "Option A is the only option"
    - "no requester-side approval exists"
  expected_baseline_faith: 1.00
  notes: |
    Sensitivity: [GREEN] stable.
    Pattern 7 (negated). The page defines two approval options:
    Option A (approval from the database owner's side -- Squad Leader or
    EM of the team that owns the target DB) and Option B (approval from
    the requester's side -- EM or Squad Leader of the requester's team).
    The negation answer: Option B does not involve the database-owner
    team. Both options literal in retrieved baseline answer (2026-05-07,
    `cross_001` baseline). MustContain on "Option B" + "requester"
    (the path that does not touch the owner team). MustNotContain
    catches the failure modes of denying Option B exists or claiming
    only Option A is valid.
