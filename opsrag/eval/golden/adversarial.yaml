# -- Pattern 1: multi-intent (single-doc only) --
# Failure mode: bot answers one half of the question and silently drops the
# other. CRITICAL design constraint per Sprint 0 batch-1 sigma analysis: BOTH
# halves must be answerable from a SINGLE source doc. Cross-doc 2-part
# questions (synth_003/009 profile) drove judge sigma=0.577 because the judge
# had to decide which retrieved chunks supported which half -- high subjectivity.
# Single-doc keeps both halves' grounding evidence in one place.

- id: adv_multiintent_001
  category: adversarial
  query: |
    Per generic-pipeline.yaml, what stages does this pipeline define,
    AND which environment variable must be unset (null) for cd.yaml to
    be included?
  expected_sources:
    - devops/gitops-pipeline-templates/generic-pipeline.yaml
  must_contain:
    - "build"
    - "CD_BYPASS"
  must_not_contain:
    - "stages are not defined"
    - "no env var is required"
  expected_baseline_faith: 1.00
  notes: |
    Sensitivity: [GREEN] stable.
    Pattern 1 (multi-intent, single-doc only). Both halves answerable
    from one file: (a) stages list contains `build` (and many others),
    (b) cd.yaml include rule reads `if: $JOB_ACTION == null && $CD_BYPASS
    == null`. Single-doc constraint deliberately avoids synth_003/009
    cross-doc judge ambiguity (sigma=0.577 profile). MustContain requires
    BOTH halves; partial answers (only stages OR only env var) fail.
    Source: verified 2026-05-07 against retrieved chunks of
    generic-pipeline.yaml.

- id: adv_multiintent_002
  category: adversarial
  query: |
    Per acme-notes-be's incident-profile, what is its primary Cloud SQL hot
    dependency by name, AND which platform-wide kubernetes runbook is
    linked for application pods stuck in CrashLoopBackOff?
  expected_sources:
    - devops/sre/sre-knowledge-base/docs/services/acme-notes-be/incident-profile.md
  must_contain:
    - "acme-notes-pg16"
    - "application-pod-is-under-crashloopbackoff"
  must_not_contain:
    - "no hot dependencies"
    - "no linked runbooks"
  expected_baseline_faith: 0.00
  notes: |
    Sensitivity: [GREEN] stable.
    Pattern 1 (multi-intent, single-doc). Both halves in one file: (a)
    acme-notes-pg16 is in the Hot Dependencies table (verified via
    synth_005 anchor), (b) application-pod-is-under-crashloopbackoff is
    in the Linked Runbooks list (verified via synth_009 anchor). Source:
    acme-notes-be/incident-profile.md.

- id: adv_multiintent_003
  category: adversarial
  query: |
    Per cd.yaml, what Python script is invoked from the post-release
    job, AND which stage does the post-release job declare?
  expected_sources:
    - devops/gitops-pipeline-templates/cd.yaml
  must_contain:
    - "jellyfish.py"
    - "post-release"
  must_not_contain:
    - "no script is invoked"
    - "no stage declared"
  expected_baseline_faith: 1.00
  notes: |
    Sensitivity: [GREEN] stable.
    Pattern 1 (multi-intent, single-doc). Both halves in cd.yaml: (a)
    jellyfish.py invoked in post-release job (verified via synth_002),
    (b) post-release stage name. Source: cd.yaml.

# -- Pattern 4: time-bounded with no anchor --
# Failure mode: bot has no created_at filter or session-time access. Should
# either ground in actual dates present in content OR acknowledge the lack
# of time-filter capability -- must NOT fabricate time-windowed claims.

- id: adv_timebound_001
  category: adversarial
  query: "Which Rootly incidents were resolved during October 2025?"
  expected_sources: []
  must_contain:
    - "incident"
  must_not_contain:
    - "in October 2025 we had"
    - "October 2025 incidents include"
    - "the following incidents were resolved in October 2025"
  expected_baseline_faith: 1.00
  notes: |
    Sensitivity: [GREEN] stable.
    Pattern 4 (time-bounded). Bot has no structured date filter on
    Rootly incidents. Should either surface actually-dated incidents
    grounded in content OR acknowledge lack of filter. MustNotContain
    catches fabricated time-windowed assertions. Source: synthesized
    2026-05-07.

- id: adv_timebound_002
  category: adversarial
  query: "Show me Slack threads from yesterday in #devops"
  expected_sources: []
  must_contain:
    - "devops"
  must_not_contain:
    - "yesterday's threads"
    - "from yesterday include"
    - "the following threads are from yesterday"
  expected_baseline_faith: 0.30
  notes: |
    Sensitivity: [GREEN] stable.
    Pattern 4 (time-bounded). Bot has no session-time concept of
    "yesterday." Should surface #devops content with explicit dates OR
    acknowledge inability to filter. MustNotContain catches assertion
    of fabricated "yesterday-windowed" lists. Source: synthesized
    2026-05-07.

- id: adv_timebound_003
  category: adversarial
  query: "Which sre-kb runbooks were updated in the past week?"
  expected_sources: []
  must_contain:
    - "runbook"
  must_not_contain:
    - "updated last week"
    - "past week's updates"
    - "recently updated runbooks include"
  expected_baseline_faith: 1.00
  notes: |
    Sensitivity: [GREEN] stable.
    Pattern 4 (time-bounded). Bot has no commit-date access. Should
    acknowledge inability to filter by update recency. MustNotContain
    catches fabricated "recently-updated list" assertions. Source:
    synthesized 2026-05-07.

# -- Pattern 6: plural-source attribution --
# Failure mode: bot collapses an enumeration to one item when many should
# be listed. Tests whether retrieval surfaces multiple matching sources
# and whether generation enumerates rather than picks one.

- id: adv_plural_001
  category: adversarial
  query: |
    Which services in the SRE knowledge base have an
    incident-profile.md file?
  expected_sources: []
  must_contain:
    - "acme-notes-be"
    - "acme-integration-api"
    - "acme-dm-be"
  must_not_contain:
    - "only one service has"
    - "no service has"
  expected_baseline_faith: 0.05
  notes: |
    Sensitivity: [YELLOW] neutral.
    Pattern 6 (plural-source). Tests `_has_plural_repo_intent` path.
    Index has incident-profile.md for at least 5 services
    (acme-notes-be, acme-integration-api, acme-dm-be, acme-reports-be, acme-tracking).
    Anchor on 3 service names that we know exist; partial enumeration
    (only one or two) fails. Source: verified 2026-05-07.

- id: adv_plural_002
  category: adversarial
  query: |
    Per the IAM Database CloudSQL Access Rule, which environments does
    the policy apply to?
  expected_sources:
    - 5355798530:iam-database-cloudsql-access-rule.md
  must_contain:
    - "PROD"
    - "PREPROD"
    - "STAGING"
  must_not_contain:
    - "only PROD"
    - "only one environment"
  expected_baseline_faith: 1.00
  notes: |
    Sensitivity: [YELLOW] neutral.
    Pattern 6 (plural-source). The IAM page lists "Production (PROD),
    Shared, Pre-Production (PREPROD), and Staging (STAGING)" verbatim in
    its scope section (verified 2026-05-07 in retrieved chunks).
    MustContain requires the 3 standard env shorthands. Source:
    iam-database-cloudsql-access-rule.md.

- id: adv_plural_003
  category: adversarial
  query: |
    Which repositories are described or referenced in the SRE knowledge
    base for our gitops setup?
  expected_sources: []
  must_contain:
    - "gitops-monorepo"
