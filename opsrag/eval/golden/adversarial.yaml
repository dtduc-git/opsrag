# adversarial -- Sprint 0 Spec 1 batch 1 (2026-05-07)
#
# Authoring policy: see tests/eval/specs/sprint0-01-goldens-expansion.md
# Anti-pattern checks: opsrag/eval/loaders.py:_validate_golden
#
# Batch 1 scope: 6 goldens covering Pattern 2 (ill-formed/casual) x3 and
# Pattern 7 (negated) x3. Patterns 1, 4, 6, 8, 9 deferred to batch 2.
# Patterns 3, 5, 10 deferred to Sprint 1 (per source-catalog.md).
#
# All anchors verified against the post-reaugment Qdrant index on 2026-05-07.

# -- Pattern 2: ill-formed / casual phrasing --
# Failure mode: bot refuses ("I don't have access") OR fabricates instead of
# surfacing real indexed content. Anchor on (a) bot must surface the queried
# service token, (b) bot must NOT emit refusal phrases. Faith judgment is
# bounded -- any answer that grounds in indexed content grades well.

# adv_illformed_001 -- first attempt ("anyone seen weird thing in acme-notes-be")
# discarded 2026-05-07 after Faith sigma=0.173 across n=3 runs (broad chart/OpenAPI
# retrieval -> extrapolative bot answer -> judge waffled). Slot reused below by
# the 2026-05-07 backfill candidate "acme-notes-be 500s wat", which probes pulled
# top-3 runbook content (incident-profile, prod.yaml, introduction).

- id: adv_illformed_001
  category: adversarial
  query: "acme-notes-be 500s wat"
  expected_sources: []
  must_contain:
    - "acme-notes-be"
  must_not_contain:
    - "I don't have access"
    - "I cannot help"
  expected_baseline_faith: 0.70
  notes: |
    Sensitivity: [GREEN] stable.
    Pattern 2 (ill-formed/casual) -- backfill 2026-05-07 for the original
    discarded "anyone seen weird thing in acme-notes-be" (Faith sigma=0.173 from
    too-broad retrieval). Mechanistic insight from batch-1 sigma analysis:
    bounded retrieval target -> bounded answer -> stable sigma. Probe
    confirmed top-3 retrieval for this query is runbook-shaped:
    incident-profile.md + introduction.md + replication-slot runbook.
    Bot's answer grounds in incident-profile (cites Kong cascade, hot
    dependency failure modes). Source: synthesized 2026-05-07.

