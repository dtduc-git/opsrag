# cross_source -- Phase 2 cross-connector synthesis tests (2026-05-07).
# Each query intentionally spans 2+ source types (Confluence + Slack,
# Rootly + Confluence, etc.) to exercise the full multi-source retrieval
# path. Recall here is the strongest signal that the retriever blends
# sources correctly, not just hits whichever one indexed first.

- id: cross_001
  category: cross_source
  query: "What kinds of database access requests do engineers submit, and what's our policy for granting them?"
  must_contain:
    - "database"
  must_not_contain:
    - "no relevant context"
    - "I don't have access"
  notes: |
    Should pull policy text from Confluence (IAM Database CloudSQL
    Access Rule page) AND example request threads from Slack #devops.
    No expected_sources because the recall surface is broad -- the
    MustContain just locks the topic alignment.

- id: cross_002
  category: cross_source
  query: "Have we had any production incidents involving acme-notes-be, and what runbooks exist for acme-notes-be in our knowledge base?"
  must_contain:
    - "acme-notes-be"
  must_not_contain:
    - "no relevant context"
    - "I don't have access"
  notes: |
    Cross-source: Rootly incidents (acme-notes-be appears in summaries +
    titles) AND Confluence/git runbooks (sre-knowledge-base/docs/
    services/acme-notes-be). Tests that the retriever blends incident
    narratives with how-to content for the same service.

- id: cross_003
  category: cross_source
  query: "Compare how we handle Cloud SQL access requests in policy documents versus what actually happens in practice on Slack."
  must_contain:
    - "Cloud SQL"
  must_not_contain:
    - "no context"
  notes: |
    Synthesis intent -- should trigger the cross-doc top_k boost. Pulls
    Confluence policy + Slack reality. Validates that synthesis
    keywords ("Compare ... versus ...") expand the retrieval window.

- id: cross_004
  category: cross_source
  query: "What was the most recent incident involving login or session issues, and what's our standard runbook for login problems?"
  must_contain:
    - "login"
  must_not_contain:
    - "no relevant context"
  notes: |
    Pairs a Rootly incident (#287, #289 family -- login/logout)
    with whatever Confluence/git runbook covers login flow. The
    "most recent X and standard Y" pattern is a common SRE on-call
    question shape that exercises ranking by recency.


# -- faithfulness traps --------------------------------------------
# These goldens exist mainly to catch the "extrapolate from a single
# chunk" failure mode (slack_003 fabricated service mappings). Each
# checks that the answer does NOT include claims that aren't in source.

- id: faith_001
  category: cross_source
  query: "Which specific organization teams own the Apache Superset deployment in staging?"
  must_not_contain:
    - "no relevant context"
    # "an upstream team" is the team that filed multiple superset SRE requests in
    # Slack -- but the requests aren't ownership claims. Bot should say
    # so or stay silent on ownership; not fabricate a definitive answer.
    - "is owned by"
    - "is responsible for the deployment"
  notes: |
    Faithfulness trap. Slack threads have an upstream team requesting
    superset support, but no chunk says an upstream team OWNS superset. Answer
    must avoid the leap from "filed support tickets about X" to "owns
    X". Tests that the prompt's "do not infer mappings" rule binds.

- id: faith_002
  category: cross_source
  query: "List every service that requested SRE support for CI/CD & Deploy issues in the past month."
  must_contain:
    - "CI/CD"
  must_not_contain:
    - "no context"
    # If the bot fabricates a service name, the redacted/non-existent
    # placeholder shouldn't appear (sanity check).
    - "fabricated-service"
  notes: |
    Listing-intent + faithfulness trap. The bot must enumerate
    services SHOWN in retrieved Slack threads' "Service / Application"
    field -- not invent additional services from prior knowledge.

- id: faith_003
  category: cross_source
  query: "What was the root cause of Rootly incident #40, and which other incidents had the same root cause?"
  expected_sources:
    - incidents/incident-40-acme-integration-api-sytem-is-down.md
  must_contain:
    - "Kafka"
  must_not_contain:
    - "no relevant context"
    # If only ONE incident matches, the bot must say so -- not invent
    # a list of "similar" incidents based on token overlap.
    - "many other incidents"
  notes: |
    Faithfulness trap on #40 (Kafka-naming-convention root cause).
    The bot should be honest that only #40 explicitly names this
    root cause unless other incidents in retrieval do -- never claim
    "many similar incidents" without enumerating each.


# -- multi-source synthesis depth ----------------------------------
- id: synth_cross_001
  category: cross_source
  query: "Compare how login-related issues have been documented: in Slack threads, in Rootly incident reports, and in Confluence runbooks. What's distinctive about each surface?"
  must_contain:
    - "login"
  must_not_contain:
    - "no relevant"
  notes: |
    Three-source synthesis. Hardest end of the spectrum -- needs
    chunks from Slack, Rootly, AND Confluence in the same answer.
    Validates that the synthesis-intent retrieval boost we just
    added pulls enough breadth to cover all three.

- id: synth_cross_002
  category: cross_source
  query: "What's the relationship between SRE Support Requests in Slack and Rootly incidents -- do they cross-reference each other?"
  must_not_contain:
    - "no relevant"
    # If the bot doesn't have evidence that they cross-reference, it
    # must say so honestly. Inventing the cross-reference is the
    # exact fabrication failure mode we're guarding against.
  notes: |
    Process-question across two ingest surfaces. Tests the bot's
    ability to honestly characterise WHAT IT SEES across sources
    (chunks from both retrieved) without inventing a cross-link
    that the data may not support.

- id: synth_cross_003
  category: cross_source
  query: "List all known issues related to qa-runner or Notes that have either an open Rootly incident or a recent Slack discussion."
  must_contain:
    - "qa-runner"
  must_not_contain:
    - "no relevant"
    - "I don't have access"
  notes: |
    Listing + cross-source. Should enumerate items grouped by source
    type. Tests both the cross_source recall and the listing-intent
    enumeration behavior. qa-runner appears in incident #260 and several
    Slack threads, so retrieval has plenty to draw from.

- id: cross_naming_001
  category: cross_source
  query: "When a client calls POST https://notes.example.com/api/v1/widget with an apiKey header, which service actually implements the widget handler -- acme-notes-be, or the saas/acme-integration-api repo? Trace how the request is routed end-to-end and cite the files that prove it."
  acceptable_sources:
    - devops/gitops/values/saas/acme-notes-be/prod.yaml
    - saas/acme-notes-be/quality_control/urls.py
    - saas/acme-notes-be/widget/api_urls.py
    - saas/acme-notes-be/widget/views/widget_view.py
  must_contain:
    - "acme-notes-be"
  must_not_contain:
    - "no relevant context"
    - "I don't have access"
    # Anti-patterns: the exact wrong conclusions OpsRAG made pre-fix.
    # The Kong route forwards to `appservice: acme-integration-api` declared
    # inside acme-notes-be's OWN chart -- so the implementation is acme-notes-be's
    # Deployment named acme-integration-api, NOT the separate saas/acme-integration-api
    # repo. Any phrasing that says the request is handled by the
    # acme-integration-api repo (or that contrasts it with acme-notes-be as if
    # they are different services for THIS route) is wrong.
    - "routed to the `acme-integration-api` service, not"
    - "routed to the acme-integration-api service, not"
    - "handled by the `acme-integration-api` service after"
    - "implementation resides within the `acme-integration-api` service"
    - "implementation resides within the acme-integration-api service"
  notes: |
    Naming-collision disambiguation (added 2026-05-18 after QA reviewer found
    OpsRAG concluding the widget endpoint is "routed to acme-integration-api
    service, not acme-notes-be" -- wrong). Two distinct entities share the
    name "acme-integration-api":
      1. Repo `saas/acme-integration-api` -- a separate Django service whose
         own prod.yaml has zero widget references; it CALLS acme-notes-be over
         HTTP (env QUALITY_CONTROL_BE_URL, IMS_URL, etc).
      2. acme-notes-be appservice `acme-integration-api` -- a K8s Deployment of
         the acme-notes-be Django codebase, declared at
         `acme-notes-be/prod.yaml` under `appservices.acme-integration-api`.
    The Kong route `int-widget-legacy` in
    `gitops-monorepo/values/saas/acme-notes-be/prod.yaml:1272` forwards
    `/api/v1/widget` to `appservice: acme-integration-api` -- entity (2),
    NOT (1). The actual handler is `WidgetViewSet.upsert_widget` in
    `saas/acme-notes-be/widget/views/widget_view.py`, mounted by
    `saas/acme-notes-be/quality_control/urls.py:68` ->
    `widget/api_urls.py`. Bot must conclude acme-notes-be implements the
    handler and must NOT phrase the answer as if the acme-integration-api
    repo is the destination for this route.
