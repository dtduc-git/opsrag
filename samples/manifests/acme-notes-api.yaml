# Acme Notes API - Kubernetes manifests (sample data for opsrag).
# Namespace, Deployment, Service, and HorizontalPodAutoscaler. Matches the
# behaviour described in samples/runbooks/001 (deploy) and 003 (scaling).
---
apiVersion: v1
kind: Namespace
metadata:
  name: acme-notes
  labels:
    app.kubernetes.io/part-of: acme-notes
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: acme-notes-api
  namespace: acme-notes
  labels:
    app: acme-notes-api
    app.kubernetes.io/part-of: acme-notes
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: acme-notes-api
  template:
    metadata:
      labels:
        app: acme-notes-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: registry.example.com/acme-notes-api:v1.8.2
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
          env:
            - name: ACME_NOTES_DB_DSN
              valueFrom:
                secretKeyRef:
                  name: acme-notes-db
                  key: dsn
            - name: ACME_NOTES_REDIS_URL
              value: redis://acme-notes-cache:6379/0
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: acme-notes-api
  namespace: acme-notes
spec:
  selector:
    app: acme-notes-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: acme-notes-api
  namespace: acme-notes
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: acme-notes-api
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
