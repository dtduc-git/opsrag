version: 2
updates:
  # Python deps (pyproject.toml).
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns: ["*"]

  # UI deps (ui/package.json).
  - package-ecosystem: npm
    directory: /ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      ui-deps:
        patterns: ["*"]

  # GitHub Actions versions used in the workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  # Base images in the Dockerfiles.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: /ui
    schedule:
      interval: weekly
