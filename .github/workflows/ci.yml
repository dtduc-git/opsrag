name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

permissions:
  contents: read
  # Needed so the Trivy image scan can upload SARIF to GitHub code scanning.
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  UV_VERSION: "0.5.x"

jobs:
  # ---------------------------------------------------------------------------
  # Static checks: lint + type. Cheap; fails fast.
  # ---------------------------------------------------------------------------
  lint:
    name: lint (ruff)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --extra dev
      - run: uv run ruff check .

  typecheck:
    name: typecheck (mypy)
    runs-on: ubuntu-24.04
    # NON-BLOCKING: the ported codebase carries ~1.3k strict-mypy findings
    # (mostly missing annotations / Optional handling). Type-hardening is a
    # tracked, incremental cleanup -- we surface the report on every run but
    # don't gate merges on it yet. Flip this to false as the count is driven down.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --extra dev
      - name: mypy (report-only, non-blocking)
        run: |
          if [ -d opsrag ]; then
            # Report findings but never fail: the job is genuinely green so
            # downstream `needs: [typecheck]` jobs aren't skipped. ~1.3k strict
            # findings are tracked type-hardening debt.
            uv run mypy opsrag || echo "::warning::mypy reported issues (non-blocking)"
          else
            echo "opsrag/ package not yet ported (Phase 2); skipping mypy."
          fi

  # ---------------------------------------------------------------------------
  # Vendor-neutrality audit: fast and always runs.
  # ---------------------------------------------------------------------------
  audit:
    name: audit-vendor-neutrality
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install pyyaml
      - name: audit (human)
        run: scripts/audit-vendor-neutrality.sh
      - name: audit (json artefact)
        if: always()
        run: scripts/audit-vendor-neutrality.sh --json > audit-report.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: audit-report
          path: audit-report.json

  # ---------------------------------------------------------------------------
  # Tests. Phase 1 of the port has no Python sources yet; jobs degrade
  # gracefully until tests/ is populated.
  # ---------------------------------------------------------------------------
  unit-tests:
    name: unit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv python install ${{ env.PYTHON_VERSION }}
      # --extra login: the shipped config.yaml defaults to auth.mode=login, so
      # importing opsrag.api (module-level create_app) needs the login extra.
      - run: uv sync --extra dev --extra login
      - name: pytest tests/unit
        run: |
          if [ -d tests/unit ]; then
            uv run pytest tests/unit -q
          else
            echo "tests/unit/ not yet populated; skipping."
          fi

  contract-tests:
    name: contract
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv python install ${{ env.PYTHON_VERSION }}
      # --extra login: shipped config.yaml defaults to auth.mode=login -> the
      # app import (module-level create_app) needs the login extra.
      - run: uv sync --extra dev --extra login
      - name: pytest tests/contract + shell contract tests
        run: |
          if [ -d tests/contract ]; then
            uv run pytest tests/contract -q
            for s in tests/contract/*.sh; do
              [ -f "$s" ] || continue
              echo "::group::$s"
              bash "$s"
              echo "::endgroup::"
            done
          else
            echo "tests/contract/ not yet populated; skipping."
          fi

  integration-tests:
    name: integration
    runs-on: ubuntu-24.04
    needs: [lint, typecheck]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: opsrag
          POSTGRES_USER: opsrag
          POSTGRES_DB: opsrag
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U opsrag"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      qdrant:
        image: qdrant/qdrant:v1.13.0
        ports: ["6333:6333"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv python install ${{ env.PYTHON_VERSION }}
      # --extra login: shipped config.yaml defaults to auth.mode=login -> the
      # app import (module-level create_app) needs the login extra.
      - run: uv sync --extra dev --extra fastembed --extra login
      - name: pytest tests/integration (excluding live-only)
        env:
          POSTGRES_URL: postgresql://opsrag:opsrag@localhost:5432/opsrag
          QDRANT_URL: http://localhost:6333
        run: |
          if [ -d tests/integration ]; then
            uv run pytest tests/integration -q
          else
            echo "tests/integration/ not yet populated; skipping."
          fi

  # ---------------------------------------------------------------------------
  # Offline retrieval eval. Always-on, NO-SECRETS proof that opsrag retrieval
  # works: indexes the shipped `samples/` corpus into an in-process Qdrant with
  # a local FastEmbed ONNX embedder, then scores the public golden set through
  # the app's default core path -- Dense + BM25 RRF fusion (hybrid_search) plus
  # a local FastEmbed cross-encoder rerank (no MMR, no live judge) -- and
  # asserts the aggregate ranking floors stay above threshold. The only network
  # it needs is the one-time FastEmbed model fetch (allowed -- CI has network).
  # No API keys. The judge-based eval-regression job below is the live tier.
  # ---------------------------------------------------------------------------
  eval-offline:
    name: eval-offline (retrieval, no secrets)
    runs-on: ubuntu-24.04
    needs: [lint, typecheck]
    # contents:write so the metrics-driven Shields endpoint badge
    # (docs/eval-badge.json) can be committed back on pushes to master.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv python install ${{ env.PYTHON_VERSION }}
      # eval (deepeval + pyyaml) + fastembed (local ONNX embedder) + qdrant-client
      # (a core dep, in-memory mode). No cloud-provider extra needed.
      - run: uv sync --extra dev --extra eval --extra fastembed
      - name: pytest offline retrieval eval over samples/
        run: uv run pytest tests/integration/test_eval_samples_retrieval.py -v
      # Recompute the aggregate metrics (the pytest gate above already proved
      # they pass) so we can (a) surface them in the run summary and (b) emit a
      # live Shields ENDPOINT badge. Same offline recipe, no secrets.
      - name: Compute metrics + write summary + badge
        id: metrics
        run: |
          uv run python - <<'PY'
          import asyncio, json, os
          from pathlib import Path
          from opsrag.eval.loaders import load_golden
          from opsrag.eval.retrieval_offline import (
              build_offline_index,
              retrieval_scores,
          )

          samples = Path("samples")

          async def main():
              goldens = load_golden()
              embedder, store = await build_offline_index(samples)
              return await retrieval_scores(embedder, store, goldens, k=5)

          agg = asyncio.run(main())
          recall = agg["mean_recall_at_k"]
          mrr = agg["mean_mrr"]
          precision = agg["mean_precision_at_k"]
          ndcg = agg["mean_ndcg_at_k"]

          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a", encoding="utf-8") as fh:
                  fh.write("## Offline retrieval eval (samples/)\n\n")
                  fh.write(
                      f"scored={agg['num_scored']} "
                      f"skipped={agg['num_skipped']} k={agg['k']}\n\n"
                  )
                  fh.write("| metric | value |\n| --- | --- |\n")
                  fh.write(f"| Recall@5 | {recall:.4f} |\n")
                  fh.write(f"| MRR | {mrr:.4f} |\n")
                  fh.write(f"| Precision@5 | {precision:.4f} |\n")
                  fh.write(f"| NDCG@5 | {ndcg:.4f} |\n")

          # Colour reflects the value, not a hardcoded green: a regression that
          # still clears the gate threshold but drops recall shows yellow/red.
          if recall >= 0.9:
              color = "brightgreen"
          elif recall >= 0.75:
              color = "yellow"
          else:
              color = "red"
          badge = {
              "schemaVersion": 1,
              # Label names BOTH the recipe (hybrid = Dense+BM25 RRF + local
              # rerank, NOT the full pipeline -- no MMR, no live judge) and the
              # synthetic-corpus scope, so the badge isn't read as a production
              # full-pipeline retrieval-quality claim.
              "label": "hybrid recall@5 (samples)",
              "message": f"{recall:.2f}",
              "color": color,
          }
          Path("docs/eval-badge.json").write_text(
              json.dumps(badge, indent=2) + "\n", encoding="utf-8"
          )
          print(
              f"Recall@5={recall:.4f} MRR={mrr:.4f} "
              f"Precision@5={precision:.4f} NDCG@5={ndcg:.4f}"
          )
          PY
      # On pushes to master only, commit the refreshed badge so the README
      # Shields endpoint reflects the latest run. No-ops when unchanged.
      - name: Commit eval badge (master pushes only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        # Best-effort: a push failure (branch protection, missing perms, or a
        # race with another commit) must NEVER red-flag a passing eval gate --
        # the badge is cosmetic. The next master push refreshes it.
        continue-on-error: true
        run: |
          if git diff --quiet -- docs/eval-badge.json; then
            echo "eval badge unchanged -- nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/eval-badge.json
          git commit -m "ci(eval): refresh offline retrieval badge [skip ci]"
          # Rebase onto any commits that landed since checkout so the push isn't
          # rejected by a non-fast-forward race.
          git pull --rebase origin master
          git push

  # ---------------------------------------------------------------------------
  # Helm chart checks.
  # ---------------------------------------------------------------------------
  helm-lint:
    name: helm-lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v5
        with:
          version: v3.16.2
      - uses: astral-sh/setup-uv@v5
      - name: install project (for the python helm contract tests)
        run: uv sync --extra dev
      - name: helm lint + template + shell contract tests (T101/T102/T105)
        run: |
          helm lint deploy/helm/opsrag
          helm template opsrag deploy/helm/opsrag > /dev/null
          for s in tests/contract/test_helm_*.sh; do
            echo "::group::$s"
            bash "$s"
            echo "::endgroup::"
          done
      - name: python helm contract tests (T103/T104 - values vs registry + env propagation)
        run: uv run pytest tests/contract/test_helm_values_covers_all_mcps.py tests/contract/test_helm_env_propagation.py -q

  # ---------------------------------------------------------------------------
  # Evaluation regression. Triggered only when prompts / agents / MCPs / eval
  # files change. Stays a no-op until the eval harness is ported (Phase 7).
  # ---------------------------------------------------------------------------
  eval-regression:
    name: eval-regression
    runs-on: ubuntu-24.04
    # NB: the old job-level `if: contains(github.event.head_commit.modified, ...)`
    # was DEAD. `contains()` over an ARRAY does an exact-element match, so it was
    # true only if a changed path equalled the literal string `opsrag/agent/`
    # (never -- elements are full paths like `opsrag/agent/graph.py`). And
    # `head_commit` is null on pull_request events / misses non-HEAD PR commits.
    # The gate therefore never ran. We now diff explicitly below with correct
    # prefix semantics, covering pushes AND the full PR range.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need history to diff against the base
      - name: Detect eval-relevant changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags origin "${{ github.base_ref }}" >/dev/null 2>&1 || true
            base="$(git merge-base "origin/${{ github.base_ref }}" HEAD 2>/dev/null || true)"
          else
            base="${{ github.event.before }}"
          fi
          if [ -z "$base" ] || ! git rev-parse --verify "$base" >/dev/null 2>&1; then
            base="HEAD^"  # first push / unknown base -- diff the single commit
          fi
          echo "diff base: $base"
          # `^opsrag/(...)/` is the prefix match the broken contains() was
          # trying (and failing) to express. It covers the agent/MCP/eval code
          # AND the retrieval pipeline (ingestion/parsers/chunkers/vectorstores/
          # embedders) -- a chunking or vectorstore change shifts what gets
          # retrieved, so it must be able to trip the eval gate too.
          if git diff --name-only "$base" HEAD | grep -qE '^opsrag/(agent|agents|mcp|eval|ingestion|parsers|chunkers|vectorstores|embedders)/'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "eval-relevant paths changed -- gate will run."
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "No eval-relevant paths changed -- gate skipped."
          fi
      - uses: astral-sh/setup-uv@v3
        if: steps.changes.outputs.relevant == 'true'
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv python install ${{ env.PYTHON_VERSION }}
        if: steps.changes.outputs.relevant == 'true'
      - run: uv sync --extra dev --extra eval
        if: steps.changes.outputs.relevant == 'true'
      - name: eval regression gate
        if: steps.changes.outputs.relevant == 'true'
        env:
          # The gate needs a live OpsRAG instance to query + judge creds. It
          # runs only when an eval target is configured; otherwise it skips
          # (rather than silently passing on a wrong/no-op command). Seeding that
          # instance + corpus is the operator's to provision (the gate can't
          # assert retrieval quality against an empty index).
          OPSRAG_URL: ${{ secrets.OPSRAG_EVAL_URL }}
          # Set OPSRAG_EVAL_REQUIRED=1 (repo/org variable) once you have a seeded
          # eval target, to turn the "no URL -> skip" silent no-op into a hard
          # failure -- so a dropped secret can't make the gate pass green.
          OPSRAG_EVAL_REQUIRED: ${{ vars.OPSRAG_EVAL_REQUIRED }}
        run: |
          if [ -z "$OPSRAG_URL" ]; then
            if [ "$OPSRAG_EVAL_REQUIRED" = "1" ]; then
              echo "OPSRAG_EVAL_REQUIRED=1 but OPSRAG_EVAL_URL is unset -- failing the gate (refusing to pass green with no eval target)." >&2
              exit 1
            fi
            echo "OPSRAG_EVAL_URL secret not set -- no live eval target; skipping the gate."
          else
            # The gate lives on the `run` subcommand and needs --tag. --gate
            # exits 1 if any gated metric is below threshold.
            #
            # NB: the eval target server must run with OPSRAG_DISABLE_QA_CACHE=1
            # so the QA cache can't serve a stored answer/sources for a golden --
            # otherwise a retrieval regression is masked by a cache hit and the
            # ranking metrics measure the cache, not retrieval. Set it where the
            # OPSRAG_EVAL_URL instance is launched, not here (this job only hits
            # the URL).
            uv run python -m opsrag.eval run --tag ci --gate
          fi

  # ---------------------------------------------------------------------------
  # Container image: build (do NOT push) on every PR/push so the Dockerfile is
  # validated continuously, not only on release tags. Single-arch amd64 +
  # GHA-backed buildx cache to keep it fast. The image is loaded into the local
  # docker daemon so the downstream scan job can analyse it.
  # ---------------------------------------------------------------------------
  image-build:
    name: image-build (amd64, no push)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Verify Dockerfile present
        run: |
          if [ ! -f Dockerfile ]; then
            echo "Dockerfile not present; skipping image build." >&2
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Build image (load, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: opsrag:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image tarball for the scan job
        run: docker save opsrag:ci -o /tmp/opsrag-ci-image.tar

      - uses: actions/upload-artifact@v7
        with:
          name: ci-image
          path: /tmp/opsrag-ci-image.tar
          retention-days: 1

  # ---------------------------------------------------------------------------
  # UI container image: build (do NOT push) on every PR/push so ui/Dockerfile is
  # validated continuously alongside the backend image. Single-arch amd64 +
  # GHA cache; release.yml does the multi-arch push on tags.
  # ---------------------------------------------------------------------------
  ui-image-build:
    name: ui-image-build (amd64, no push)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Verify ui/Dockerfile present
        run: |
          if [ ! -f ui/Dockerfile ]; then
            echo "ui/Dockerfile not present; skipping UI image build." >&2
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Build UI image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./ui
          file: ui/Dockerfile
          platforms: linux/amd64
          push: false
          tags: opsrag-ui:ci
          cache-from: type=gha,scope=opsrag-ui
          cache-to: type=gha,mode=max,scope=opsrag-ui

  # ---------------------------------------------------------------------------
  # Trivy vulnerability scan of the CI-built image. Two passes:
  #   1. Gate: fails the job on any CRITICAL finding (exit-code 1).
  #   2. Report: non-failing CRITICAL+HIGH SARIF, uploaded to code scanning.
  # ---------------------------------------------------------------------------
  image-scan:
    name: image-scan (trivy)
    runs-on: ubuntu-24.04
    needs: image-build
    # Non-blocking: the SARIF upload needs GHAS (unavailable on a private repo)
    # and the CRITICAL gate can flag unpatched base-image CVEs. Keep the scan
    # running for visibility without failing the run. Tighten once GHAS is on
    # and the base image is clean.
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ci-image
          path: /tmp

      - name: Load image into docker
        run: docker load -i /tmp/opsrag-ci-image.tar

      - name: Trivy scan (SARIF report, CRITICAL+HIGH, non-failing)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: opsrag:ci
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        # SARIF upload needs GHAS (unavailable on private repo) -- don't fail.
        continue-on-error: true
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Trivy scan (gate, fail on CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: opsrag:ci
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
