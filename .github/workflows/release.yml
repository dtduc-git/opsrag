name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # Validate the release tag once, expose it as a job output that downstream
  # jobs can rely on. Keeps user-controlled values out of every `run:` block.
  # ---------------------------------------------------------------------------
  resolve-tag:
    name: resolve + validate tag
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve tag
        id: resolve
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "${REF_TYPE}" != "tag" ]; then
            echo "release workflow only runs on tag refs (got ref_type=${REF_TYPE})" >&2
            exit 1
          fi
          TAG="${REF_NAME}"
          if ! printf '%s' "${TAG}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "release tag '${TAG}' does not match v<semver>" >&2
            exit 1
          fi
          {
            echo "tag=${TAG}"
            echo "version=${TAG#v}"
          } >> "$GITHUB_OUTPUT"

  build-and-push:
    # Matrix builds BOTH images: the backend (root Dockerfile) and the UI
    # (ui/Dockerfile). Each is multi-arch, signed (SBOM + provenance), pushed to
    # its own GHCR repo, and Trivy-gated on CRITICAL. fail-fast=false so one
    # image's failure doesn't cancel the other's diagnostics.
    name: build + push ${{ matrix.name }}
    runs-on: ubuntu-24.04
    needs: resolve-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: opsrag
            context: .
            file: Dockerfile
            image: ${{ github.repository }}
            platforms: linux/amd64,linux/arm64
          # UI is a static nginx-served SPA -> amd64 only. Its Node build step
          # crashes QEMU under arm64 emulation ("uncaught target signal 4"),
          # and arm64 coverage isn't worth it for static assets.
          - name: opsrag-ui
            context: ./ui
            file: ui/Dockerfile
            image: ${{ github.repository }}-ui
            platforms: linux/amd64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ needs.resolve-tag.outputs.tag }}
            type=semver,pattern={{version}},value=${{ needs.resolve-tag.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.resolve-tag.outputs.tag }}
            type=raw,value=latest,enable=${{ !contains(needs.resolve-tag.outputs.tag, '-') }}
          labels: |
            org.opencontainers.image.title=${{ matrix.name }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.resolve-tag.outputs.tag }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Verify Dockerfile present
        env:
          DOCKERFILE: ${{ matrix.file }}
        run: |
          if [ ! -f "${DOCKERFILE}" ]; then
            echo "${DOCKERFILE} not present; aborting release." >&2
            exit 1
          fi

      - name: Build + push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      # Scan the pushed image (by immutable digest) and gate the release on
      # CRITICAL vulnerabilities. Runs after the multi-arch build/SBOM/
      # provenance so none of that is disturbed; helm-package `needs` this job.
      - name: Trivy scan pushed image (gate on CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  helm-package:
    name: package + publish Helm chart
    runs-on: ubuntu-24.04
    needs: [resolve-tag, build-and-push]
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v5
        with:
          version: v3.16.2

      - name: helm package
        env:
          CHART_VERSION: ${{ needs.resolve-tag.outputs.version }}
        run: |
          if [ ! -d deploy/helm/opsrag ]; then
            echo "deploy/helm/opsrag/ not yet authored; skipping chart publish."
            exit 0
          fi
          helm package deploy/helm/opsrag \
            --version "${CHART_VERSION}" \
            --app-version "${CHART_VERSION}" \
            --destination ./charts

      - name: Login to GHCR (OCI)
        if: hashFiles('charts/*.tgz') != ''
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          REGISTRY_HOST: ${{ env.REGISTRY }}
        run: |
          printf '%s' "${GHCR_TOKEN}" \
            | helm registry login "${REGISTRY_HOST}" \
              --username "${GHCR_USER}" --password-stdin

      - name: helm push (OCI)
        if: hashFiles('charts/*.tgz') != ''
        env:
          REGISTRY_HOST: ${{ env.REGISTRY }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          for tgz in charts/*.tgz; do
            helm push "$tgz" "oci://${REGISTRY_HOST}/${REPO_OWNER}/charts"
          done

  github-release:
    name: create GitHub Release
    runs-on: ubuntu-24.04
    needs: [resolve-tag, build-and-push]
    permissions:
      contents: write   # only this job writes a release; default stays read
    steps:
      - uses: actions/checkout@v4
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          name: ${{ needs.resolve-tag.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ contains(needs.resolve-tag.outputs.tag, '-') }}
          body: |
            Multi-arch (amd64/arm64) container images:

            ```
            docker pull ${{ env.REGISTRY }}/${{ github.repository }}:${{ needs.resolve-tag.outputs.version }}
            docker pull ${{ env.REGISTRY }}/${{ github.repository }}-ui:${{ needs.resolve-tag.outputs.version }}
            ```

            Helm chart: `oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts/opsrag` (version `${{ needs.resolve-tag.outputs.version }}`)

            See [CHANGELOG.md](${{ github.server_url }}/${{ github.repository }}/blob/${{ needs.resolve-tag.outputs.tag }}/CHANGELOG.md).
