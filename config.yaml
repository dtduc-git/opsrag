# =============================================================================
# opsrag - default configuration (local evaluation stack)
# =============================================================================
# This is the config the bundled docker-compose stack loads by default
# (OPSRAG_CONFIG=/app/config.yaml). It is tuned for the fifteen-minute
# quickstart: ONE secret (ANTHROPIC_API_KEY) is enough to boot and answer a
# question about the bundled sample corpus.
#
# Defaults chosen for a no-extra-accounts bring-up:
#   - LLM         : Anthropic (the only key you must supply)
#   - Embeddings  : fastembed - runs locally on-device, no API key
#   - Vector store: Qdrant (compose service)
#   - Graph       : none (FR-019 null backend - no Neo4j needed)
#   - MCP         : all 20 integrations disabled (FR-011)
#
# Everything that varies per deployment (URLs, secrets) is read from env or
# this file - never hardcoded in code. See config-example.yaml for every
# available knob with inline documentation.
# =============================================================================

# --- Authentication ----------------------------------------------------------
# Authentication is ALWAYS enforced -- there is no anonymous / "open" mode.
# mode: login -> first-party login (built-in admin + optional SSO). THE DEFAULT,
#                and what the compose demo uses: the API seeds the bootstrap
#                admin from OPSRAG_ADMIN_EMAIL / OPSRAG_ADMIN_PASSWORD and signs
#                session cookies with OPSRAG_SESSION_SIGNING_KEY -- all wired in
#                deploy/compose/docker-compose.yaml, so a fresh clone boots a
#                working admin login with no extra config.
# mode: oidc  -> validate Bearer JWTs against an external IdP (issuer/audience).
#                There is no local account in this mode: identity comes from the
#                token and the `admin` role is granted by mapping an IdP `groups`
#                claim via `role_mappings` (see the commented block below). The
#                bundled Dex issuer illustrates this path; full walkthrough +
#                provider setup live in docs/auth.md.
auth:
  mode: login
  login:
    signing_key_env: OPSRAG_SESSION_SIGNING_KEY
    cookie_secure: false      # local http demo (no TLS); MUST be true behind HTTPS

  # --- oidc alternative: swap `mode: login` -> `mode: oidc` and uncomment ------
  # Points at the bundled Dex issuer; in a real deployment set issuer/audience to
  # your own IdP (Okta / Entra / Google). NOTE (local compose): Dex advertises
  # its issuer as http://localhost:5556/dex (the browser URL); inside the compose
  # network the API reaches it at http://dex:5556/dex -- align both sides if you
  # hit issuer-mismatch errors. Grant admin by mapping an IdP group to the
  # `admin` role (the role bundles every scope).
  # issuer: http://dex:5556/dex
  # audience: opsrag-local
  # jwks_cache_seconds: 300
  # role_mappings:
  #   sre-admins: ["admin"]          # IdP `groups` value -> OpsRAG admin role

# --- LLM provider ------------------------------------------------------------
llm:
  provider: anthropic            # anthropic | openai | vertex | bedrock
  model: claude-sonnet-4-20250514
  api_key_env: ANTHROPIC_API_KEY
  max_tokens: 4096

# --- Vision (image understanding) --------------------------------------------
# On by default: attach an image in the web UI or a channel bot and it is sent,
# ephemerally, to a vision-capable model for that turn. With the Anthropic
# default above the active model already sees, so no fallback is needed; left
# null, `model`/`provider` resolve a provider-aware default when the active
# model can't see (Bedrock/Anthropic -> claude-sonnet-4-6; Vertex ->
# gemini-3-flash-preview). See config-example.yaml for every knob.
vision:
  enabled: true
  model: null            # null -> provider-aware default (override: OPSRAG_VISION_MODEL)
  provider: null         # null -> llm.provider
  max_images: 4
  max_bytes: 5242880     # 5 MB

# --- Embeddings --------------------------------------------------------------
# fastembed keeps the quickstart single-key: the model downloads on first use
# (~45 MB) and runs on-device. Switch to provider: openai (api_key_env:
# OPENAI_API_KEY) for hosted embeddings.
embedding:
  provider: fastembed            # fastembed | openai | vertex | bedrock
  model: BAAI/bge-small-en-v1.5  # 384-dim local ONNX model

# --- Vector store ------------------------------------------------------------
vector_store:
  provider: qdrant               # qdrant | pgvector
  url: http://qdrant:6333        # compose service hostname
  collection: opsrag

# --- Knowledge graph ---------------------------------------------------------
# Null backend by default (FR-019): no graph database runs in the minimal
# deployment. Set provider: neo4j and supply NEO4J_PASSWORD to enable.
knowledge_graph:
  provider: none                 # none | neo4j

# --- Sessions ----------------------------------------------------------------
# Postgres-backed so /readyz can verify the database. DSN comes from the
# POSTGRES_DSN env var (set by the compose stack).
session:
  provider: postgres             # memory | postgres
  dsn_env: POSTGRES_DSN

# --- Conversation memory -----------------------------------------------------
memory:
  provider: memory               # memory | postgres

# --- Observability -----------------------------------------------------------
# console keeps boot robust even if the trace collector is down. Switch to
# provider: phoenix (endpoint: http://phoenix:6006) to stream LangGraph traces
# to the bundled Phoenix UI.
observability:
  provider: console              # console | phoenix
  project_name: opsrag

# --- Entity extraction -------------------------------------------------------
# rule_based avoids any LLM dependency for ingestion. Not consumed by the
# default (null-graph) pipeline, but kept explicit for clarity.
entity_extraction:
  method: rule_based             # rule_based | llm | hybrid

# --- Agent tuning ------------------------------------------------------------
agent:
  mode: full                     # full | minimal  (legacy 'hybrid' lane removed)
  top_k: 10
  rerank_top_k: 5
  max_retries: 3

# --- Multi-channel bots (Slack / Telegram / Discord / Teams) -----------------
# All disabled by default. Enable a channel here AND run a worker with
# OPSRAG_ROLE=<name>bot (slackbot / telegrambot / discordbot). Teams is a
# webhook on the `api` role (no worker). Tokens are referenced by `*_env` var
# names only. See config-example.yaml for the full per-channel field set.
channels:
  slack:    { enabled: false }
  telegram: { enabled: false }
  discord:  { enabled: false }
  teams:    { enabled: false }

# --- MCP integrations --------------------------------------------------------
# All twenty are present and disabled by default (FR-011). Flip enabled: true
# and supply the integration's required credentials via env to activate one.
# Enabling without the required env causes a fail-fast startup error:
#   MCP_MISCONFIGURED:<name>:<missing-env-var>   (FR-004)
mcp:
  aws:           { enabled: false }
  azure:         { enabled: false }
  billing_datadog:       { enabled: false, restricted: true }
  billing_gcp:           { enabled: false, restricted: true }
  billing_kubecost:      { enabled: false, restricted: true }
  billing_mongodb_atlas: { enabled: false, restricted: true }
  cloudflare:    { enabled: false }
  cloudwatch:    { enabled: false }
  code:          { enabled: false }
  datadog:       { enabled: false }
  elasticsearch: { enabled: false }
  gcp:           { enabled: false }
  github:        { enabled: false }
  gitlab:        { enabled: false }
  grafana:       { enabled: false }
  knowledge:     { enabled: false }
  kubernetes:    { enabled: false }
  loki:          { enabled: false }
  pagerduty:     { enabled: false }
  prometheus:    { enabled: false }
  rootly:        { enabled: false }
  runbooks:      { enabled: false }
  sentry:        { enabled: false }
  slack:         { enabled: false }
  splunk:        { enabled: false }
  stackdriver:   { enabled: false }
  tool_cache:    { enabled: false }
